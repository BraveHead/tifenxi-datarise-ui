  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"zh-CN\"><head>\n<meta charset=\"utf-8\">\n<title>Make · 设计系统规范<\u002Ftitle>\n<style>/* ============================================================\n   Make · 设计系统 Tokens\n   以「满意度分析」模块为基准\n   ============================================================ */\n\n:root {\n  /* —— 品牌 / 主色 —— */\n  --brand-50:  #EFF6FF;\n  --brand-100: #DBEAFE;\n  --brand-200: #BFDBFE;\n  --brand-400: #60A5FA;\n  --brand-500: #3B82F6;   /* 主色 · 链接 · 选中态 */\n  --brand-600: #2563EB;\n  --brand-700: #1D4ED8;\n\n  /* —— 中性色（背景 / 文字 / 描边） —— */\n  --neutral-0:   #FFFFFF;\n  --neutral-25:  #FAFBFC;  /* 页面底色 */\n  --neutral-50:  #F5F7FA;  /* 次级容器 */\n  --neutral-100: #EEF0F2;  /* 分隔线 · 描边 */\n  --neutral-200: #E1E4E8;  /* 输入描边 */\n  --neutral-300: #C9CED6;\n  --neutral-400: #9AA1AD;  /* 辅助文字 */\n  --neutral-500: #6B7280;  /* 次要文字 */\n  --neutral-700: #374151;  /* 正文 */\n  --neutral-900: #1F2328;  /* 标题 */\n\n  /* —— 语义色（每色 4 阶：浅底 / 边 / 主 / 深文字） —— */\n  --success-bg:    #E8F6EF;\n  --success-border:#BCE3CD;\n  --success-500:   #2BA471;\n  --success-700:   #1B7A52;\n\n  --warning-bg:    #FEF5E7;\n  --warning-border:#F5D79A;\n  --warning-500:   #F5A623;\n  --warning-700:   #B5740F;\n\n  --danger-bg:     #FDECEC;\n  --danger-border: #F5B9BB;\n  --danger-500:    #E5484D;\n  --danger-700:    #AD1F24;\n\n  --info-bg:       #EAF3FE;   /* Callout 信息条底色 */\n  --info-border:   #BBD6F7;\n  --info-500:      #3B82F6;\n  --info-700:      #1F5EC0;\n\n  /* 严重度（专用，略带橙调，与 warning 区分） */\n  --severity-high-bg:     #FFF1E6;\n  --severity-high-border: #FFD4B0;\n  --severity-high-text:   #D9722A;\n\n  /* —— 图表色序列（5 档满意度：1–5 分） —— */\n  --chart-1: #E5484D;   /* 1–2 分 */\n  --chart-2: #F5A623;   /* 3 分 */\n  --chart-3: #C9CED6;   /* 4 分 */\n  --chart-4: #5DB9A1;   /* 4.x 过渡 */\n  --chart-5: #2BA471;   /* 5 分 */\n  /* 对比维度序列（折线 / 多条柱） */\n  --series-1: #3B82F6;\n  --series-2: #2BA471;\n  --series-3: #F5A623;\n  --series-4: #8B5CF6;\n  --series-5: #EC4899;\n  --series-6: #14B8A6;\n\n  /* —— 字体 —— */\n  --font-sans: -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Helvetica Neue\", \"Microsoft YaHei\", sans-serif;\n  --font-mono: ui-monospace, \"SF Mono\", \"Cascadia Code\", Consolas, monospace;\n  --font-num:  \"SF Pro Display\", -apple-system, \"Helvetica Neue\", sans-serif;\n\n  /* —— 字号层级 —— */\n  --fs-11: 11px;   /* 辅助 / 角标 */\n  --fs-12: 12px;   /* 图例 · 元信息 */\n  --fs-13: 13px;   /* 次要正文 */\n  --fs-14: 14px;   /* 正文 · 按钮 */\n  --fs-16: 16px;   /* 小节标题 */\n  --fs-18: 18px;   /* 模块标题 */\n  --fs-20: 20px;   /* 页面标题 */\n  --fs-24: 24px;   /* 关键数字 */\n  --fs-32: 32px;   /* 大指标 */\n\n  /* 行高 */\n  --lh-tight: 1.25;\n  --lh-base:  1.5;\n  --lh-loose: 1.7;\n\n  /* 字重 */\n  --fw-regular: 400;\n  --fw-medium:  500;\n  --fw-semibold:600;\n\n  /* —— 间距（4px 基础单位） —— */\n  --sp-0:  0;\n  --sp-1:  4px;\n  --sp-2:  8px;\n  --sp-3:  12px;\n  --sp-4:  16px;\n  --sp-5:  20px;\n  --sp-6:  24px;\n  --sp-8:  32px;\n  --sp-10: 40px;\n  --sp-12: 48px;\n  --sp-16: 64px;\n\n  /* —— 圆角 —— */\n  --radius-xs: 2px;\n  --radius-sm: 4px;   /* Tag / Chip */\n  --radius-md: 6px;   /* 按钮 / 输入框 */\n  --radius-lg: 8px;   /* 卡片 */\n  --radius-xl: 12px;  /* 弹层 */\n  --radius-full: 999px;\n\n  /* —— 阴影（克制使用） —— */\n  --shadow-none: none;\n  --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04);\n  --shadow-pop:  0 6px 16px -4px rgba(15, 23, 42, 0.12), 0 2px 4px rgba(15, 23, 42, 0.06);\n  --shadow-modal:0 20px 48px -8px rgba(15, 23, 42, 0.18);\n\n  /* —— 描边 —— */\n  --border-subtle: 1px solid var(--neutral-100);\n  --border-default:1px solid var(--neutral-200);\n  --border-strong: 1px solid var(--neutral-300);\n\n  /* —— 过渡 —— */\n  --ease-out: cubic-bezier(.16,.84,.44,1);\n  --ease-std: cubic-bezier(.4,0,.2,1);\n  --dur-fast: 120ms;\n  --dur-base: 180ms;\n  --dur-slow: 240ms;\n\n  /* —— Z-Index 层级 —— */\n  --z-dropdown: 100;\n  --z-sticky:   200;\n  --z-drawer:   400;\n  --z-modal:    500;\n  --z-toast:    600;\n}\n\n/* ============================================================\n   基础复位 + 全局排版\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  font-family: var(--font-sans);\n  font-size: var(--fs-14);\n  line-height: var(--lh-base);\n  color: var(--neutral-900);\n  background: var(--neutral-25);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\n/* 数字常用 tabular */\n.num { font-variant-numeric: tabular-nums; font-family: var(--font-num); }\n<\u002Fstyle>\n<style>/* ============================================================\n   Make · 设计系统组件样式\n   ============================================================ */\n\n/* ---------- 通用容器 / 布局 ---------- */\n.slide {\n  width: 100%;\n  height: 100%;\n  padding: 44px 72px 56px;\n  background: var(--neutral-25);\n  color: var(--neutral-900);\n  overflow: auto;\n  display: flex;\n  flex-direction: column;\n}\n.slide-header { margin-bottom: 32px; }\n.slide-kicker {\n  font-size: var(--fs-12);\n  color: var(--neutral-400);\n  font-weight: var(--fw-medium);\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  margin-bottom: 10px;\n}\n.slide-title {\n  font-size: 32px;\n  line-height: 1.2;\n  font-weight: var(--fw-semibold);\n  color: var(--neutral-900);\n  margin: 0 0 8px;\n  letter-spacing: -0.01em;\n}\n.slide-subtitle {\n  font-size: var(--fs-14);\n  color: var(--neutral-500);\n  max-width: 720px;\n  line-height: var(--lh-base);\n  margin: 0;\n}\n\n.section {\n  margin-top: 32px;\n}\n.section-heading {\n  font-size: var(--fs-14);\n  font-weight: var(--fw-semibold);\n  color: var(--neutral-500);\n  letter-spacing: 0.04em;\n  margin: 0 0 16px;\n  padding-bottom: 8px;\n  border-bottom: var(--border-subtle);\n  display: flex;\n  align-items: center;\n  gap: 10px;\n}\n.section-heading .num-chip {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 20px;\n  height: 20px;\n  font-size: 11px;\n  border-radius: var(--radius-full);\n  background: var(--neutral-100);\n  color: var(--neutral-700);\n  font-weight: var(--fw-semibold);\n}\n\n/* ---------- 卡片 / 模块 Shell ---------- */\n.card {\n  background: var(--neutral-0);\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n}\n.card + .card { margin-top: 16px; }\n\n.module {\n  background: var(--neutral-0);\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n  padding: 20px 24px 24px;\n}\n.module + .module { margin-top: 16px; }\n\n.module-header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n  margin-bottom: 16px;\n}\n.module-title {\n  font-size: var(--fs-16);\n  font-weight: var(--fw-semibold);\n  color: var(--neutral-900);\n  margin: 0;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n\n/* ---------- Callout / 信息条 ---------- */\n.callout {\n  display: flex;\n  align-items: flex-start;\n  gap: 10px;\n  padding: 10px 14px;\n  background: var(--info-bg);\n  border-radius: var(--radius-md);\n  font-size: var(--fs-13);\n  color: var(--neutral-700);\n}\n.callout .icon {\n  flex: none;\n  width: 16px;\n  height: 16px;\n  color: var(--info-500);\n  margin-top: 2px;\n}\n.callout .kv-row {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 0 20px;\n  align-items: center;\n}\n.callout .kv-row > span {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n}\n.callout .kv-row > span + span {\n  position: relative;\n  padding-left: 20px;\n}\n.callout .kv-row > span + span::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  top: 50%;\n  transform: translateY(-50%);\n  width: 1px;\n  height: 12px;\n  background: var(--info-border);\n}\n.callout .k { color: var(--neutral-500); }\n.callout .v { color: var(--neutral-900); font-weight: var(--fw-medium); }\n.callout .v.link { color: var(--info-700); border-bottom: 1px dashed var(--info-border); cursor: pointer; }\n\n.callout.warning { background: var(--warning-bg); }\n.callout.warning .icon { color: var(--warning-500); }\n.callout.danger  { background: var(--danger-bg); }\n.callout.danger  .icon { color: var(--danger-500); }\n.callout.success { background: var(--success-bg); }\n.callout.success .icon { color: var(--success-500); }\n\n/* ---------- 标签 / 徽标 ---------- */\n.tag {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  height: 22px;\n  padding: 0 8px;\n  border-radius: var(--radius-sm);\n  font-size: var(--fs-12);\n  font-weight: var(--fw-medium);\n  line-height: 1;\n  white-space: nowrap;\n}\n.tag--severity-high {\n  background: var(--severity-high-bg);\n  color: var(--severity-high-text);\n  border: 1px solid var(--severity-high-border);\n}\n.tag--severity-mid {\n  background: var(--warning-bg);\n  color: var(--warning-700);\n  border: 1px solid var(--warning-border);\n}\n.tag--severity-low {\n  background: var(--neutral-50);\n  color: var(--neutral-500);\n  border: 1px solid var(--neutral-200);\n}\n.tag--danger  { background: var(--danger-bg);  color: var(--danger-700);  border: 1px solid var(--danger-border); }\n.tag--success { background: var(--success-bg); color: var(--success-700); border: 1px solid var(--success-border); }\n.tag--info    { background: var(--info-bg);    color: var(--info-700);    border: 1px solid var(--info-border); }\n.tag--neutral { background: var(--neutral-50); color: var(--neutral-700); border: 1px solid var(--neutral-200); }\n\n.dot {\n  display: inline-block;\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--neutral-300);\n  flex: none;\n}\n.dot--danger  { background: var(--danger-500); }\n.dot--success { background: var(--success-500); }\n.dot--warning { background: var(--warning-500); }\n.dot--info    { background: var(--info-500); }\n\n/* ---------- 按钮 ---------- */\n.btn {\n  appearance: none;\n  border: 1px solid transparent;\n  font-family: inherit;\n  font-size: var(--fs-14);\n  font-weight: var(--fw-medium);\n  line-height: 1;\n  padding: 0 14px;\n  height: 32px;\n  border-radius: var(--radius-md);\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 6px;\n  transition: background var(--dur-fast) var(--ease-std),\n              border-color var(--dur-fast) var(--ease-std),\n              color var(--dur-fast) var(--ease-std);\n  user-select: none;\n  white-space: nowrap;\n}\n.btn[disabled], .btn.is-disabled {\n  cursor: not-allowed;\n  opacity: 0.5;\n  pointer-events: none;\n}\n/* primary */\n.btn--primary { background: var(--brand-500); color: #fff; }\n.btn--primary:hover { background: var(--brand-600); }\n.btn--primary:active { background: var(--brand-700); }\n/* default */\n.btn--default {\n  background: var(--neutral-0);\n  color: var(--neutral-700);\n  border-color: var(--neutral-200);\n}\n.btn--default:hover { background: var(--neutral-50); border-color: var(--neutral-300); }\n.btn--default:active { background: var(--neutral-100); }\n/* ghost / text */\n.btn--ghost { background: transparent; color: var(--brand-600); }\n.btn--ghost:hover { background: var(--brand-50); }\n.btn--ghost:active { background: var(--brand-100); }\n/* danger */\n.btn--danger { background: var(--danger-500); color: #fff; }\n.btn--danger:hover { background: var(--danger-700); }\n\n.btn--sm { height: 28px; font-size: var(--fs-13); padding: 0 10px; }\n.btn--lg { height: 40px; font-size: var(--fs-14); padding: 0 20px; }\n\n/* ---------- 输入框 / 选择器 ---------- */\n.input, .select {\n  font-family: inherit;\n  font-size: var(--fs-14);\n  color: var(--neutral-900);\n  height: 32px;\n  padding: 0 12px;\n  background: var(--neutral-0);\n  border: 1px solid var(--neutral-200);\n  border-radius: var(--radius-md);\n  transition: border-color var(--dur-fast), box-shadow var(--dur-fast);\n  outline: none;\n  width: 100%;\n}\n.input::placeholder { color: var(--neutral-400); }\n.input:hover, .select:hover { border-color: var(--neutral-300); }\n.input:focus, .select:focus {\n  border-color: var(--brand-500);\n  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);\n}\n.input[disabled] { background: var(--neutral-50); color: var(--neutral-400); cursor: not-allowed; }\n\n.label {\n  display: block;\n  font-size: var(--fs-13);\n  color: var(--neutral-700);\n  margin-bottom: 6px;\n  font-weight: var(--fw-medium);\n}\n.help { font-size: var(--fs-12); color: var(--neutral-400); margin-top: 4px; }\n.help--error { color: var(--danger-500); }\n\n/* ---------- Tabs（下划线式，满意度分析用这种） ---------- */\n.tabs {\n  display: flex;\n  gap: 24px;\n  border-bottom: var(--border-subtle);\n  margin-bottom: 16px;\n}\n.tab {\n  position: relative;\n  padding: 8px 0 10px;\n  font-size: var(--fs-14);\n  color: var(--neutral-500);\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  transition: color var(--dur-fast);\n}\n.tab:hover { color: var(--neutral-900); }\n.tab.is-active {\n  color: var(--brand-600);\n  font-weight: var(--fw-medium);\n}\n.tab.is-active::after {\n  content: \"\";\n  position: absolute;\n  left: 0; right: 0;\n  bottom: -1px;\n  height: 2px;\n  background: var(--brand-500);\n  border-radius: 1px 1px 0 0;\n}\n\n/* ---------- 进度条 / 对比条 ---------- */\n.bar-row {\n  display: grid;\n  grid-template-columns: 120px 180px 1fr;\n  align-items: center;\n  gap: 16px;\n  padding: 10px 0;\n}\n.bar-row + .bar-row { border-top: var(--border-subtle); }\n.bar-row .bar-name { font-size: var(--fs-13); display: flex; align-items: center; gap: 6px; color: var(--neutral-700); }\n.bar-row .bar-metric {\n  font-size: var(--fs-13);\n  color: var(--neutral-700);\n  display: flex; align-items: baseline; gap: 6px;\n}\n.bar-row .bar-metric .score {\n  font-family: var(--font-num);\n  font-weight: var(--fw-semibold);\n  font-size: var(--fs-14);\n  color: var(--neutral-900);\n}\n.bar-row .bar-metric .delta-down { color: var(--danger-500); font-size: var(--fs-12); }\n.bar-row .bar-metric .delta-up   { color: var(--success-500); font-size: var(--fs-12); }\n\n.bar-track {\n  position: relative;\n  height: 8px;\n  background: var(--neutral-50);\n  border-radius: var(--radius-full);\n  overflow: hidden;\n}\n.bar-fill {\n  position: absolute;\n  inset: 0 auto 0 0;\n  background: var(--danger-500);\n  border-radius: inherit;\n}\n.bar-fill--success { background: var(--success-500); }\n.bar-fill--warning { background: var(--warning-500); }\n\n/* 分段条（5 档满意度分布） */\n.seg-bar {\n  display: flex;\n  height: 16px;\n  border-radius: var(--radius-sm);\n  overflow: hidden;\n  background: var(--neutral-100);\n}\n.seg-bar > span { height: 100%; display: block; }\n.seg-bar .s1 { background: var(--chart-1); }\n.seg-bar .s2 { background: var(--warning-500); }\n.seg-bar .s3 { background: var(--neutral-300); }\n.seg-bar .s4 { background: var(--chart-4); }\n.seg-bar .s5 { background: var(--success-500); }\n\n.legend {\n  display: inline-flex;\n  gap: 14px;\n  font-size: var(--fs-12);\n  color: var(--neutral-500);\n}\n.legend > span { display: inline-flex; align-items: center; gap: 5px; }\n\n/* ---------- 表格 ---------- */\n.table {\n  width: 100%;\n  border-collapse: separate;\n  border-spacing: 0;\n  font-size: var(--fs-13);\n  background: var(--neutral-0);\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n}\n.table thead th {\n  text-align: left;\n  font-weight: var(--fw-medium);\n  color: var(--neutral-500);\n  background: var(--neutral-50);\n  padding: 10px 16px;\n  font-size: var(--fs-12);\n  border-bottom: var(--border-subtle);\n  white-space: nowrap;\n}\n.table tbody td {\n  padding: 12px 16px;\n  border-top: var(--border-subtle);\n  color: var(--neutral-700);\n  vertical-align: middle;\n}\n.table tbody tr:first-child td { border-top: none; }\n.table tbody tr:hover { background: var(--neutral-25); }\n.table td.num { text-align: right; font-family: var(--font-num); }\n.table td .row-title { color: var(--neutral-900); font-weight: var(--fw-medium); }\n\n/* ---------- 指标卡 / KPI ---------- */\n.kpi {\n  padding: 20px 24px;\n  background: var(--neutral-0);\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n}\n.kpi-label {\n  font-size: var(--fs-13);\n  color: var(--neutral-500);\n  margin-bottom: 8px;\n  display: flex; align-items: center; gap: 4px;\n}\n.kpi-value {\n  font-family: var(--font-num);\n  font-size: 32px;\n  font-weight: var(--fw-semibold);\n  color: var(--neutral-900);\n  letter-spacing: -0.02em;\n  line-height: 1.1;\n}\n.kpi-value .unit { font-size: var(--fs-14); color: var(--neutral-500); font-weight: var(--fw-regular); margin-left: 2px; }\n.kpi-trend { margin-top: 8px; font-size: var(--fs-12); display: flex; align-items: center; gap: 4px; }\n.kpi-trend.up   { color: var(--success-500); }\n.kpi-trend.down { color: var(--danger-500); }\n\n/* ---------- 空状态 ---------- */\n.empty {\n  padding: 20px 16px;\n  text-align: center;\n  color: var(--neutral-400);\n}\n.empty-illustration {\n  width: 56px; height: 56px;\n  margin: 0 auto 10px;\n  border-radius: 50%;\n  background: repeating-linear-gradient(45deg, var(--neutral-100), var(--neutral-100) 4px, var(--neutral-50) 4px, var(--neutral-50) 8px);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--neutral-300);\n  font-size: 32px;\n}\n.empty-title { font-size: var(--fs-14); color: var(--neutral-700); margin-bottom: 4px; font-weight: var(--fw-medium); }\n.empty-desc  { font-size: var(--fs-13); color: var(--neutral-400); }\n\n/* Loading / Skeleton */\n.skeleton {\n  background: linear-gradient(90deg, var(--neutral-50) 0%, var(--neutral-100) 50%, var(--neutral-50) 100%);\n  background-size: 200% 100%;\n  animation: skeleton 1.4s infinite linear;\n  border-radius: var(--radius-sm);\n}\n@keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }\n\n/* ---------- 占位图（绝不手绘复杂 SVG） ---------- */\n.placeholder {\n  background-image:\n    linear-gradient(45deg, var(--neutral-100) 25%, transparent 25%),\n    linear-gradient(-45deg, var(--neutral-100) 25%, transparent 25%),\n    linear-gradient(45deg, transparent 75%, var(--neutral-100) 75%),\n    linear-gradient(-45deg, transparent 75%, var(--neutral-100) 75%);\n  background-size: 12px 12px;\n  background-position: 0 0, 0 6px, 6px -6px, -6px 0;\n  background-color: var(--neutral-25);\n  border: 1px dashed var(--neutral-200);\n  border-radius: var(--radius-md);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--neutral-400);\n  font-family: var(--font-mono);\n  font-size: var(--fs-12);\n  text-align: center;\n  padding: 16px;\n}\n\n/* ---------- Swatch / Token 展示卡 ---------- */\n.token-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));\n  gap: 16px;\n}\n.swatch {\n  border: var(--border-subtle);\n  border-radius: var(--radius-md);\n  overflow: hidden;\n  background: var(--neutral-0);\n}\n.swatch-color {\n  height: 64px;\n  border-bottom: var(--border-subtle);\n}\n.swatch-meta {\n  padding: 10px 12px;\n  font-size: var(--fs-12);\n}\n.swatch-meta .name {\n  color: var(--neutral-900);\n  font-weight: var(--fw-medium);\n  margin-bottom: 2px;\n  display: block;\n}\n.swatch-meta .token {\n  color: var(--neutral-400);\n  font-family: var(--font-mono);\n  font-size: 11px;\n}\n.swatch-meta .hex {\n  color: var(--neutral-500);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  display: block;\n}\n\n/* ---------- Spec / Do-Don't 说明框 ---------- */\n.spec-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 16px;\n}\n.spec-box {\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n  padding: 16px;\n  background: var(--neutral-0);\n}\n.spec-box .hd {\n  font-size: var(--fs-12);\n  font-weight: var(--fw-semibold);\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  margin-bottom: 10px;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n}\n.spec-box.do  .hd { color: var(--success-700); }\n.spec-box.dont .hd { color: var(--danger-700); }\n.spec-box .body { font-size: var(--fs-13); color: var(--neutral-700); line-height: var(--lh-base); }\n\n/* ---------- 并排对比：Before / After ---------- */\n.ba-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 20px;\n}\n.ba-frame {\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n  background: var(--neutral-0);\n}\n.ba-frame .ba-label {\n  padding: 8px 14px;\n  font-size: var(--fs-12);\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  font-weight: var(--fw-semibold);\n  border-bottom: var(--border-subtle);\n  display: flex; align-items: center; gap: 6px;\n}\n.ba-frame.before .ba-label { color: var(--neutral-500); background: var(--neutral-50); }\n.ba-frame.after  .ba-label { color: var(--brand-600); background: var(--brand-50); }\n.ba-body { padding: 16px; }\n\n/* ---------- 代码片段 ---------- */\n.code {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  background: var(--neutral-900);\n  color: #D7DDE5;\n  padding: 14px 16px;\n  border-radius: var(--radius-md);\n  line-height: 1.6;\n  overflow: auto;\n  white-space: pre;\n}\n\n/* ---------- 次级 & 辅助 ---------- */\n.muted { color: var(--neutral-400); }\n.sep-dot { color: var(--neutral-300); margin: 0 8px; }\n.icon-circle {\n  width: 20px; height: 20px;\n  border-radius: 50%;\n  background: var(--info-bg);\n  color: var(--info-500);\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 12px;\n  font-weight: var(--fw-semibold);\n  flex: none;\n}\n\n/* 两列 / 三列布局 */\n.col-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n.col-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n.col-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }\n\n/* ---------- 导航 / AppShell 样例 ---------- */\n.shell {\n  display: grid;\n  grid-template-columns: 200px 1fr;\n  height: 320px;\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n  background: var(--neutral-0);\n}\n.shell-sidebar {\n  background: var(--neutral-0);\n  border-right: var(--border-subtle);\n  padding: 16px 12px;\n}\n.shell-logo {\n  font-size: var(--fs-14);\n  font-weight: var(--fw-semibold);\n  color: var(--neutral-900);\n  padding: 4px 12px 16px;\n  letter-spacing: -0.01em;\n}\n.nav-item {\n  display: flex; align-items: center; gap: 10px;\n  padding: 8px 12px;\n  font-size: var(--fs-13);\n  color: var(--neutral-700);\n  border-radius: var(--radius-md);\n  cursor: pointer;\n}\n.nav-item:hover { background: var(--neutral-50); }\n.nav-item.is-active { background: var(--brand-50); color: var(--brand-700); font-weight: var(--fw-medium); }\n.nav-item .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--neutral-300); }\n.nav-item.is-active .nav-dot { background: var(--brand-500); }\n.shell-main { padding: 20px 24px; overflow: auto; background: var(--neutral-25); }\n.shell-top {\n  height: 44px;\n  border-bottom: var(--border-subtle);\n  padding: 0 24px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  background: var(--neutral-0);\n}\n\n/* ---------- AppShell v2: 顶栏 + 面包屑/过滤 + 主体 ---------- */\n.appshell-v2 {\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n  background: var(--neutral-25);\n  display: flex; flex-direction: column;\n}\n/* L1 顶部菜单栏 */\n.topnav {\n  height: 44px;\n  background: var(--neutral-0);\n  border-bottom: var(--border-subtle);\n  display: flex; align-items: center; gap: 0;\n  padding: 0 14px;\n}\n.topnav .logo-mark {\n  width: 26px; height: 26px; border-radius: 6px;\n  background: linear-gradient(135deg, var(--brand-500), var(--brand-700));\n  color: #fff; font-weight: 700; font-size: 13px;\n  display: inline-flex; align-items: center; justify-content: center;\n  margin-right: 14px;\n  letter-spacing: -0.02em;\n}\n.topnav-menu { display: flex; align-items: center; gap: 4px; flex: 1; }\n.topnav-item {\n  font-size: 13px; color: var(--neutral-700);\n  padding: 6px 10px; border-radius: var(--radius-md);\n  display: inline-flex; align-items: center; gap: 6px; cursor: pointer;\n  white-space: nowrap;\n}\n.topnav-item .caret { font-size: 9px; color: var(--neutral-400); }\n.topnav-item:hover { background: var(--neutral-50); }\n.topnav-item.is-active {\n  background: var(--brand-50); color: var(--brand-700);\n  font-weight: var(--fw-medium);\n}\n.topnav-item.is-active .caret { color: var(--brand-500); }\n.topnav-item .mini-ico {\n  width: 12px; height: 12px; color: var(--neutral-500);\n}\n.topnav-item.is-active .mini-ico { color: var(--brand-600); }\n.topnav-right {\n  display: flex; align-items: center; gap: 12px;\n  color: var(--neutral-500);\n}\n.topnav-right .dot-btn {\n  width: 26px; height: 26px; border-radius: 50%;\n  display: inline-flex; align-items: center; justify-content: center;\n  color: var(--neutral-500); position: relative;\n}\n.topnav-right .dot-btn:hover { background: var(--neutral-50); }\n.topnav-right .badge-red {\n  position: absolute; top: 2px; right: 2px;\n  width: 12px; height: 12px; border-radius: 50%;\n  background: var(--danger-500); color: #fff;\n  font-size: 9px; line-height: 12px; text-align: center;\n  border: 1.5px solid var(--neutral-0);\n}\n.topnav-right .avatar {\n  width: 26px; height: 26px; border-radius: 50%;\n  background: var(--neutral-200); color: var(--neutral-700);\n  font-size: 11px; font-weight: 600;\n  display: inline-flex; align-items: center; justify-content: center;\n}\n\n/* L2 面包屑 + 过滤条 */\n.subnav-bar {\n  height: 44px;\n  padding: 0 20px;\n  background: var(--neutral-0);\n  border-bottom: var(--border-subtle);\n  display: flex; align-items: center; justify-content: space-between; gap: 12px;\n}\n.crumb {\n  display: flex; align-items: center; gap: 6px;\n  font-size: 13px; color: var(--neutral-600);\n}\n.crumb .crumb-home {\n  display: inline-flex; align-items: center; gap: 4px;\n  color: var(--neutral-500);\n}\n.crumb .crumb-sep { color: var(--neutral-300); font-size: 11px; }\n.crumb .crumb-cur { color: var(--neutral-900); font-weight: var(--fw-medium); }\n\n.filter-chips {\n  display: flex; align-items: center; gap: 8px;\n}\n.filter-pill {\n  height: 28px;\n  padding: 0 10px;\n  border: var(--border-subtle);\n  background: var(--neutral-0);\n  border-radius: var(--radius-md);\n  display: inline-flex; align-items: center; gap: 6px;\n  font-size: 12px; color: var(--neutral-700);\n}\n.filter-pill .pi-ico { width: 12px; height: 12px; color: var(--neutral-500); }\n.filter-pill .pi-caret { font-size: 9px; color: var(--neutral-400); margin-left: 2px; }\n.filter-pill.is-selected {\n  background: var(--brand-50);\n  border-color: var(--brand-200);\n  color: var(--brand-700);\n}\n.filter-pill.is-selected .pi-ico { color: var(--brand-600); }\n.filter-pill .pi-x {\n  font-size: 12px; color: var(--neutral-400); margin-left: 2px;\n  padding-left: 4px; border-left: 1px dashed var(--neutral-200);\n}\n\n/* L3 主体 */\n.appshell-body {\n  padding: 18px 20px;\n  background: var(--neutral-25);\n  flex: 1;\n  overflow: auto;\n}\n.appshell-headline {\n  display: flex; align-items: baseline; justify-content: space-between;\n  margin-bottom: 12px;\n}\n.appshell-headline .hl-title {\n  font-size: 18px; font-weight: var(--fw-semibold); color: var(--neutral-900);\n  letter-spacing: -0.01em;\n}\n.appshell-headline .hl-meta {\n  font-size: 12px; color: var(--neutral-500);\n}\n\n/* 标注层：编号圆点 + 指示线 */\n.anno-dot {\n  width: 18px; height: 18px; border-radius: 50%;\n  background: var(--brand-600); color: #fff;\n  font-size: 11px; font-weight: 600;\n  display: inline-flex; align-items: center; justify-content: center;\n  box-shadow: 0 0 0 2px var(--neutral-0), 0 1px 3px rgba(15,23,42,.15);\n}\n.anno-dot--warn { background: #c2410c; }\n.anno-dot--info { background: var(--info-500); }\n.anno-legend {\n  display: grid; grid-template-columns: auto 1fr; gap: 10px 12px;\n  font-size: 12px; color: var(--neutral-700);\n  align-items: start;\n}\n.anno-legend b { color: var(--neutral-900); font-weight: var(--fw-semibold); margin-right: 4px; }\n\n/* ---------- Drawer 预览 ---------- */\n.drawer-demo {\n  position: relative;\n  height: 360px;\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n  background: var(--neutral-50);\n}\n.drawer-demo .dimmer { position: absolute; inset: 0; background: rgba(15,23,42,.3); }\n.drawer-demo .drawer {\n  position: absolute;\n  right: 0; top: 0; bottom: 0;\n  width: 56%;\n  background: var(--neutral-0);\n  box-shadow: var(--shadow-pop);\n  padding: 20px 24px;\n  display: flex;\n  flex-direction: column;\n  gap: 16px;\n}\n.drawer-head {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  border-bottom: var(--border-subtle);\n  padding-bottom: 12px;\n}\n.drawer-head .t { font-size: var(--fs-16); font-weight: var(--fw-semibold); }\n\n/* ---------- Anatomy 标注 ---------- */\n.anat { position: relative; }\n.anat-note {\n  position: absolute;\n  font-size: 11px;\n  color: var(--brand-600);\n  font-family: var(--font-mono);\n  background: var(--brand-50);\n  border: 1px solid var(--brand-200);\n  padding: 2px 6px;\n  border-radius: var(--radius-sm);\n  white-space: nowrap;\n}\n.anat-line {\n  position: absolute;\n  border-top: 1px dashed var(--brand-400);\n  height: 0;\n}\n\n/* =========================================================\n   EXTENDED · 基于「满意度分析」截图提炼的新组件\n   ========================================================= */\n\n/* ---------- KPI 卡（Datarise 样式：全宽贴底 sparkline + 右上图标徽章） ---------- */\n.kpi-card {\n  position: relative;\n  background: var(--neutral-0);\n  border: var(--border-subtle);\n  border-radius: var(--radius-lg);\n  padding: 16px 18px 0;   /* 底部 0：sparkline 贴底全宽 */\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  overflow: hidden;\n  min-height: 150px;\n}\n.kpi-card .head {\n  display: flex; align-items: flex-start; justify-content: space-between;\n  gap: 10px;\n}\n.kpi-card .name {\n  font-size: 13px; color: var(--neutral-600);\n  font-weight: var(--fw-regular);\n  display: inline-flex; align-items: center; gap: 4px;\n  line-height: 1.3;\n}\n.kpi-card .name .muted { color: var(--neutral-400); font-size: 11px; }\n\n/* 右上图标徽章：柔和淡色底 + 深色 stroke 图标 */\n.kpi-card .icon-badge {\n  flex-shrink: 0;\n  width: 28px; height: 28px;\n  border-radius: 8px;\n  display: inline-flex; align-items: center; justify-content: center;\n  background: var(--neutral-100);\n  color: var(--neutral-600);\n}\n.kpi-card .icon-badge svg { width: 14px; height: 14px; }\n.kpi-card .icon-badge--mood  { background: #eef2ff; color: #4f46e5; }\n.kpi-card .icon-badge--pulse { background: #ecfdf5; color: #059669; }\n.kpi-card .icon-badge--trend { background: #f5f3ff; color: #7c3aed; }\n.kpi-card .icon-badge--alert { background: #fff1ea; color: #c2410c; }\n.kpi-card .icon-badge--users { background: #fdf2f8; color: #be185d; }\n\n/* 数值 */\n.kpi-card .value {\n  font-family: var(--font-num);\n  font-size: 30px; font-weight: var(--fw-semibold);\n  color: var(--neutral-900);\n  letter-spacing: -0.02em;\n  line-height: 1;\n  display: flex; align-items: baseline; gap: 5px;\n  margin-top: 2px;\n}\n.kpi-card .value .unit {\n  font-size: 13px; color: var(--neutral-500); font-weight: 400;\n  letter-spacing: 0;\n  font-family: var(--font-sans);\n}\n\n/* 同环比：小字 + 箭头色语义；透明底，非填色 chip */\n.kpi-card .deltas {\n  display: flex; align-items: center; gap: 14px;\n  font-size: 11px; font-family: var(--font-num);\n  color: var(--neutral-500);\n  flex-wrap: wrap;\n}\n.kpi-card .delta {\n  display: inline-flex; align-items: center; gap: 3px;\n  white-space: nowrap;\n}\n.kpi-card .delta .arr { font-size: 10px; line-height: 1; }\n.kpi-card .delta .lbl { color: var(--neutral-500); font-family: var(--font-sans); }\n.kpi-card .delta.good { color: var(--success-600); }\n.kpi-card .delta.good .lbl { color: var(--success-600); }\n.kpi-card .delta.bad  { color: var(--danger-600); }\n.kpi-card .delta.bad  .lbl { color: var(--danger-600); }\n\n/* 右侧 AI 归因小链接 chip（风险卡使用） */\n.kpi-card .infer-chip {\n  display: inline-flex; align-items: center; gap: 4px;\n  font-size: 11px; color: var(--info-600);\n  padding: 2px 6px; border-radius: var(--radius-sm);\n  background: var(--info-bg);\n  font-family: var(--font-sans);\n  margin-left: auto;\n  cursor: pointer;\n}\n.kpi-card .infer-chip svg { width: 11px; height: 11px; }\n\n/* sparkline：贴底但左右与卡内内容对齐（留 18px padding） */\n.kpi-card .sparkline {\n  display: block;\n  width: 100%;\n  margin-top: auto;\n  margin-bottom: 14px;\n  height: 36px;\n}\n.kpi-card .sparkline polyline { fill: none; stroke-width: 1.5; }\n\n/* 危险卡：左侧红竖条 + 粉色渐变底 */\n.kpi-card.danger {\n  background: linear-gradient(180deg, #fff1ea 0%, #fff6f2 100%);\n  border-color: #fcd9c6;\n}\n.kpi-card.danger::before {\n  content: ''; position: absolute; left: 0; top: 0; bottom: 0;\n  width: 3px; background: var(--danger-500);\n}\n.kpi-card.danger .value { color: var(--neutral-900); }\n\n/* 兼容旧调用 */\n.kpi-card .chip {\n  display: inline-flex; align-items: center; gap: 2px;\n  height: 18px; padding: 0 6px;\n  font-size: 11px; font-weight: var(--fw-medium);\n  border-radius: var(--radius-sm); font-family: var(--font-num);\n}\n.kpi-card .chip.up { background: var(--success-bg); color: var(--success-700); }\n.kpi-card .chip.down { background: var(--danger-bg); color: var(--danger-700); }\n.kpi-card .sub { font-size: 11px; color: var(--neutral-400); }\n\n/* ---------- Segment Tabs（胶囊式） ---------- */\n.seg-tabs {\n  display: inline-flex;\n  background: var(--neutral-50);\n  border: var(--border-subtle);\n  border-radius: var(--radius-md);\n  padding: 3px;\n  gap: 2px;\n}\n.seg-tab {\n  font-size: var(--fs-13);\n  color: var(--neutral-500);\n  padding: 4px 14px;\n  border-radius: var(--radius-sm);\n  cursor: pointer;\n  display: inline-flex; align-items: center; gap: 5px;\n}\n.seg-tab.is-active {\n  background: var(--neutral-0);\n  color: var(--neutral-900);\n  font-weight: var(--fw-medium);\n  box-shadow: 0 1px 2px rgba(15,23,42,.06);\n}\n\n/* ---------- AI 总结 Callout ---------- */\n.ai-summary {\n  background: #FFF8E8;\n  border: 1px solid #F5D79A;\n  border-radius: var(--radius-md);\n  padding: 12px 14px;\n  font-size: var(--fs-13);\n  line-height: 1.65;\n  color: var(--neutral-700);\n}\n.ai-summary .hd { font-weight: var(--fw-semibold); color: var(--warning-700); margin-bottom: 4px; display: inline-flex; align-items: center; gap: 6px; }\n.ai-summary .ai-icon {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 18px; height: 18px; border-radius: 50%;\n  background: var(--warning-500); color: #fff; font-size: 11px; font-weight: 700;\n}\n.ai-summary .hilite {\n  color: var(--brand-700);\n  background: var(--brand-50);\n  padding: 0 4px;\n  border-bottom: 1px solid var(--brand-200);\n  border-radius: 2px;\n}\n.ai-summary .bad { color: var(--danger-700); background: var(--danger-bg); padding: 0 4px; border-radius: 2px; border-bottom: 1px solid var(--danger-border); }\n\n/* ---------- AI 洞察 / 引用块 ---------- */\n.ai-insight {\n  background: var(--neutral-25);\n  border-left: 3px solid var(--warning-500);\n  border-radius: var(--radius-sm);\n  padding: 10px 14px;\n  font-size: var(--fs-13);\n  color: var(--neutral-700);\n  line-height: 1.6;\n}\n.ai-quote {\n  margin-top: 6px;\n  padding: 8px 10px;\n  background: var(--neutral-0);\n  border: var(--border-subtle);\n  border-radius: var(--radius-sm);\n  font-size: var(--fs-12);\n  color: var(--neutral-500);\n}\n.ai-quote::before { content: \"❝ \"; color: var(--neutral-300); }\n.ai-quote-label { font-size: 11px; color: var(--neutral-400); margin-bottom: 2px; }\n\n/* ---------- 行动建议 List ---------- */\n.action-list { display: flex; flex-direction: column; gap: 10px; }\n.action-card {\n  background: var(--neutral-0);\n  border: var(--border-subtle);\n  border-radius: var(--radius-md);\n  padding: 12px 14px;\n  display: flex;\n  gap: 12px;\n  align-items: flex-start;\ font-size: 11px; color: var(--neutral-500); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- ============ SLIDE 1: COVER ============ -->\n<section data-label=\"封面\" class=\"cover\">\n  <div class=\"accent-bar\"><\u002Fdiv>\n  <div style=\"font-size: 14px; color: var(--brand-600); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px;\">Make · Design System v1.0<\u002Fdiv>\n  <h1>全局设计规范<br>与模块定义标准<\u002Fh1>\n  <p class=\"sub\">以「满意度分析」模块为基准，统一 Make 应用全局的视觉语言、交互规范、组件约定与模块结构。本规范为跨团队的单一真实来源。<\u002Fp>\n  <div class=\"meta\">\n    <div><b>基准模块<\u002Fb>满意度分析 / Satisfaction<\u002Fdiv>\n    <div><b>版本<\u002Fb>v1.0 · 2026.04<\u002Fdiv>\n    <div><b>作用范围<\u002Fb>Make 应用全局<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 2: TOC ============ -->\n<section data-label=\"目录\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">Contents · 目录<\u002Fdiv>\n    <h1 class=\"slide-title\">本手册的 9 个章节<\u002Fh1>\n    <p class=\"slide-subtitle\">从基础 tokens 到模块级定义，逐层构建统一语言。<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"toc-grid\">\n    <div class=\"toc-item\"><div class=\"n\">01<\u002Fdiv><div class=\"t\">设计原则<\u002Fdiv><div class=\"d\">一致、克制、可读、有层次。四条全局准则。<\u002Fdiv><\u002Fdiv>\n    <div class=\"toc-item\"><div class=\"n\">02<\u002Fdiv><div class=\"t\">色彩 Tokens<\u002Fdiv><div class=\"d\">中性色、语义色、图表色、严重度色的命名与使用。<\u002Fdiv><\u002Fdiv>\n    <div class=\"toc-item\"><div class=\"n\">03<\u002Fdiv><div class=\"t\">字体与排版<\u002Fdiv><div class=\"d\">字号层级、字重、行高、数字字体的统一约定。<\u002Fdiv><\u002Fdiv>\n    <div class=\"toc-item\"><div class=\"n\">04<\u002Fdiv><div class=\"t\">间距 / 圆角 / 阴影<\u002Fdiv><div class=\"d\">4px 基础单位的间距尺、三档圆角、三层阴影。<\u002Fdiv><\u002Fdiv>\n    <div class=\"toc-item\"><div class=\"n\">05<\u002Fdiv><div class=\"t\">核心组件<\u002Fdiv><div class=\"d\">按钮、输入、标签、Tabs、Callout、进度条、表格、KPI。<\u002Fdiv><\u002Fdiv>\n    <div class=\"toc-item\"><div class=\"n\">06<\u002Fdiv><div class=\"t\">模块定义规范<\u002Fdiv><div class=\"d\">以满意度分析为模板，定义模块的解剖结构与槽位。<\u002Fdiv><\u002Fdiv>\n    <div class=\"toc-item\"><div class=\"n\">07<\u002Fdiv><div class=\"t\">页面结构<\u002Fdiv><div class=\"d\">AppShell、Dashboard、列表页、详情抽屉的布局约束。<\u002Fdiv><\u002Fdiv>\n    <div class=\"toc-item\"><div class=\"n\">08<\u002Fdiv><div class=\"t\">状态与反馈<\u002Fdiv><div class=\"d\">加载、空、错误、成功态的视觉统一。<\u002Fdiv><\u002Fdiv>\n    <div class=\"toc-item\"><div class=\"n\">09<\u002Fdiv><div class=\"t\">迁移示例<\u002Fdiv><div class=\"d\">两个示例模块：统一前 vs 统一后。<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 3: PRINCIPLES ============ -->\n<section data-label=\"设计原则\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">01 · Principles<\u002Fdiv>\n    <h1 class=\"slide-title\">四条设计原则<\u002Fh1>\n    <p class=\"slide-subtitle\">所有设计决策的判断依据。当规范不明确时，回到原则。<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"col-2\" style=\"gap: 20px;\">\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\"><span class=\"icon-circle\" style=\"background: var(--brand-50); color: var(--brand-600);\">1<\u002Fspan>一致性 Consistency<\u002Fdiv><\u002Fdiv>\n      <p style=\"color: var(--neutral-700); font-size: 14px; line-height: 1.65; margin: 0;\">同类信息使用同一种承载方式。模块结构、颜色语义、间距节奏、交互反馈在全局保持同形同名。<b>偏差必须有理由<\u002Fb>。<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\"><span class=\"icon-circle\" style=\"background: var(--success-bg); color: var(--success-700);\">2<\u002Fspan>克制 Restraint<\u002Fdiv><\u002Fdiv>\n      <p style=\"color: var(--neutral-700); font-size: 14px; line-height: 1.65; margin: 0;\">能用描边不用阴影，能用中性不用彩色，能少一层不多一层。<b>颜色和强调是稀缺资源<\u002Fb>，只给真正关键的信息。<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\"><span class=\"icon-circle\" style=\"background: var(--warning-bg); color: var(--warning-700);\">3<\u002Fspan>可读性 Legibility<\u002Fdiv><\u002Fdiv>\n      <p style=\"color: var(--neutral-700); font-size: 14px; line-height: 1.65; margin: 0;\">数字使用等宽数字字体；正文最小 13px；图表必配图例；Tag 有边界；<b>颜色永远不是唯一承载信息的通道<\u002Fb>（配合文字或图形）。<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\"><span class=\"icon-circle\" style=\"background: var(--danger-bg); color: var(--danger-700);\">4<\u002Fspan>层次 Hierarchy<\u002Fdiv><\u002Fdiv>\n      <p style=\"color: var(--neutral-700); font-size: 14px; line-height: 1.65; margin: 0;\">通过字号、字重、颜色和位置建立信息主次。每个模块应能用一眼识别出：<b>标题 → 上下文 → 结论 → 支撑数据<\u002Fb>。<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-note\"><span>Make Design System · v1.0<\u002Fspan><span>03 / 12<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 4: COLOR ============ -->\n<section data-label=\"色彩\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">02 · Color Tokens<\u002Fdiv>\n    <h1 class=\"slide-title\">色彩系统<\u002Fh1>\n    <p class=\"slide-subtitle\">中性色承载 80% 的界面。语义色仅用于状态、严重度与图表。<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <div class=\"section-heading\"><span class=\"num-chip\">1<\u002Fspan>中性色（Neutrals）<\u002Fdiv>\n    <div class=\"token-grid\">\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#FFFFFF; border-bottom:1px solid #EEF0F2;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">白底<\u002Fspan><span class=\"token\">--neutral-0<\u002Fspan><span class=\"hex\">#FFFFFF<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#FAFBFC;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">页面底<\u002Fspan><span class=\"token\">--neutral-25<\u002Fspan><span class=\"hex\">#FAFBFC<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#F5F7FA;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">次级容器<\u002Fspan><span class=\"token\">--neutral-50<\u002Fspan><span class=\"hex\">#F5F7FA<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#EEF0F2;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">描边 / 分割<\u002Fspan><span class=\"token\">--neutral-100<\u002Fspan><span class=\"hex\">#EEF0F2<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#9AA1AD;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">辅助文字<\u002Fspan><span class=\"token\">--neutral-400<\u002Fspan><span class=\"hex\">#9AA1AD<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#6B7280;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">次要文字<\u002Fspan><span class=\"token\">--neutral-500<\u002Fspan><span class=\"hex\">#6B7280<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#374151;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">正文<\u002Fspan><span class=\"token\">--neutral-700<\u002Fspan><span class=\"hex\">#374151<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#1F2328;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">标题<\u002Fspan><span class=\"token\">--neutral-900<\u002Fspan><span class=\"hex\">#1F2328<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <div class=\"section-heading\"><span class=\"num-chip\">2<\u002Fspan>语义色（Semantic）<\u002Fdiv>\n    <div class=\"col-4\">\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#3B82F6;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">信息 / 主色 Info<\u002Fspan><span class=\"token\">--info-500 / --brand-500<\u002Fspan><span class=\"hex\">#3B82F6<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#2BA471;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">成功 / 正向 Success<\u002Fspan><span class=\"token\">--success-500<\u002Fspan><span class=\"hex\">#2BA471<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#F5A623;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">警示 Warning<\u002Fspan><span class=\"token\">--warning-500<\u002Fspan><span class=\"hex\">#F5A623<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"swatch-color\" style=\"background:#E5484D;\"><\u002Fdiv><div class=\"swatch-meta\"><span class=\"name\">危险 / 风险 Danger<\u002Fspan><span class=\"token\">--danger-500<\u002Fspan><span class=\"hex\">#E5484D<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:13px; color: var(--neutral-500); margin-top:14px;\">每种语义色有 4 阶：<code class=\"inline\">-bg<\u002Fcode> 浅底、<code class=\"inline\">-border<\u002Fcode> 边、<code class=\"inline\">-500<\u002Fcode> 主、<code class=\"inline\">-700<\u002Fcode> 深文字。Callout / Tag / Dot 使用浅底 + 边 + 深文字组合。<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <div class=\"section-heading\"><span class=\"num-chip\">3<\u002Fspan>图表色序列（Chart Palette）<\u002Fdiv>\n    <div class=\"col-2\">\n      <div class=\"module\">\n        <div style=\"font-size:13px; color:var(--neutral-500); margin-bottom:12px;\">满意度评分（有序 · 1 → 5 分）<\u002Fdiv>\n        <div class=\"seg-bar\" style=\"margin-bottom:10px; height:20px;\"><span class=\"s1\" style=\"flex:2;\"><\u002Fspan><span class=\"s2\" style=\"flex:1;\"><\u002Fspan><span class=\"s3\" style=\"flex:1;\"><\u002Fspan><span class=\"s4\" style=\"flex:1;\"><\u002Fspan><span class=\"s5\" style=\"flex:6;\"><\u002Fspan><\u002Fdiv>\n        <div class=\"legend\"><span><span class=\"dot\" style=\"background:var(--chart-1)\"><\u002Fspan>1–2 分<\u002Fspan><span><span class=\"dot\" style=\"background:var(--chart-2)\"><\u002Fspan>3 分<\u002Fspan><span><span class=\"dot\" style=\"background:var(--chart-3)\"><\u002Fspan>4 分<\u002Fspan><span><span class=\"dot\" style=\"background:var(--chart-5)\"><\u002Fspan>5 分<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"module\">\n        <div style=\"font-size:13px; color:var(--neutral-500); margin-bottom:12px;\">分类维度（离散 · 多条柱 / 折线）<\u002Fdiv>\n        <div style=\"display:flex; gap:4px; height:20px; border-radius:4px; overflow:hidden;\">\n          <div style=\"flex:1; background:var(--series-1)\"><\u002Fdiv>\n          <div style=\"flex:1; background:var(--series-2)\"><\u002Fdiv>\n          <div style=\"flex:1; background:var(--series-3)\"><\u002Fdiv>\n          <div style=\"flex:1; background:var(--series-4)\"><\u002Fdiv>\n          <div style=\"flex:1; background:var(--series-5)\"><\u002Fdiv>\n          <div style=\"flex:1; background:var(--series-6)\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"legend\" style=\"margin-top:10px;\"><span><span class=\"dot\" style=\"background:var(--series-1)\"><\u002Fspan>series-1<\u002Fspan><span><span class=\"dot\" style=\"background:var(--series-2)\"><\u002Fspan>series-2<\u002Fspan><span><span class=\"dot\" style=\"background:var(--series-3)\"><\u002Fspan>series-3<\u002Fspan><span><span class=\"dot\" style=\"background:var(--series-4)\"><\u002Fspan>series-4<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-note\"><span>02 · Color Tokens<\u002Fspan><span>04 / 12<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 5: TYPOGRAPHY + SPACING ============ -->\n<section data-label=\"排版与间距\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">03 · Typography · 04 · Spacing<\u002Fdiv>\n    <h1 class=\"slide-title\">字号、间距、圆角、阴影<\u002Fh1>\n    <p class=\"slide-subtitle\">字号七档覆盖 11–32px；间距以 4 为基。圆角与阴影克制使用。<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"col-2\" style=\"gap: 24px;\">\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">字号层级<\u002Fdiv><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"tok\">--fs-32<\u002Fspan><span class=\"meta\">32 / 1.2 · 600<\u002Fspan><span class=\"sample\" style=\"font-size:32px; font-weight:600;\">关键指标 98.2<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"tok\">--fs-20<\u002Fspan><span class=\"meta\">20 / 1.25 · 600<\u002Fspan><span class=\"sample\" style=\"font-size:20px; font-weight:600;\">页面标题<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"tok\">--fs-16<\u002Fspan><span class=\"meta\">16 / 1.4 · 600<\u002Fspan><span class=\"sample\" style=\"font-size:16px; font-weight:600;\">模块标题 / 小节标题<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"tok\">--fs-14<\u002Fspan><span class=\"meta\">14 / 1.5 · 400<\u002Fspan><span class=\"sample\" style=\"font-size:14px;\">正文内容 · 这是一段示例文字。<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"tok\">--fs-13<\u002Fspan><span class=\"meta\">13 / 1.5 · 400<\u002Fspan><span class=\"sample\" style=\"font-size:13px;\">次要正文 · 表格内文、描述文字<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"tok\">--fs-12<\u002Fspan><span class=\"meta\">12 / 1.4 · 400<\u002Fspan><span class=\"sample\" style=\"font-size:12px; color:var(--neutral-500);\">元信息 / 图例 / 标签<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"tok\">--fs-11<\u002Fspan><span class=\"meta\">11 / 1.4 · 500<\u002Fspan><span class=\"sample\" style=\"font-size:11px; color:var(--neutral-400); letter-spacing:0.04em;\">角标 / KICKER<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">间距尺（4px 基础）<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-ruler\">\n        <div class=\"spacing-item\"><span class=\"name\">--sp-1<\u002Fspan><span class=\"px\">4px<\u002Fspan><span class=\"block\" style=\"width:4px;\"><\u002Fspan><\u002Fdiv>\n        <div class=\"spacing-item\"><span class=\"name\">--sp-2<\u002Fspan><span class=\"px\">8px<\u002Fspan><span class=\"block\" style=\"width:8px;\"><\u002Fspan><\u002Fdiv>\n        <div class=\"spacing-item\"><span class=\"name\">--sp-3<\u002Fspan><span class=\"px\">12px<\u002Fspan><span class=\"block\" style=\"width:12px;\"><\u002Fspan><\u002Fdiv>\n        <div class=\"spacing-item\"><span class=\"name\">--sp-4<\u002Fspan><span class=\"px\">16px<\u002Fspan><span class=\"block\" style=\"width:16px;\"><\u002Fspan><\u002Fdiv>\n        <div class=\"spacing-item\"><span class=\"name\">--sp-5<\u002Fspan><span class=\"px\">20px<\u002Fspan><span class=\"block\" style=\"width:20px;\"><\u002Fspan><\u002Fdiv>\n        <div class=\"spacing-item\"><span class=\"name\">--sp-6<\u002Fspan><span class=\"px\">24px<\u002Fspan><span class=\"block\" style=\"width:24px;\"><\u002Fspan><\u002Fdiv>\n        <div class=\"spacing-item\"><span class=\"name\">--sp-8<\u002Fspan><span class=\"px\">32px<\u002Fspan><span class=\"block\" style=\"width:32px;\"><\u002Fspan><\u002Fdiv>\n        <div class=\"spacing-item\"><span class=\"name\">--sp-10<\u002Fspan><span class=\"px\">40px<\u002Fspan><span class=\"block\" style=\"width:40px;\"><\u002Fspan><\u002Fdiv>\n        <div class=\"spacing-item\"><span class=\"name\">--sp-12<\u002Fspan><span class=\"px\">48px<\u002Fspan><span class=\"block\" style=\"width:48px;\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; color:var(--neutral-500); margin-top: 14px; line-height:1.5;\">\n        <b style=\"color:var(--neutral-900);\">使用约定<\u002Fb>：模块内元素间距用 <code class=\"inline\">sp-3~4<\u002Fcode>；小节之间用 <code class=\"inline\">sp-6<\u002Fcode>；模块之间用 <code class=\"inline\">sp-4<\u002Fcode>；页面边距用 <code class=\"inline\">sp-10<\u002Fcode>。\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"col-2\" style=\"gap: 24px; margin-top: 20px;\">\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">圆角<\u002Fdiv><\u002Fdiv>\n      <div class=\"radius-demo\">\n        <div class=\"r-box\" style=\"border-radius:2px;\">xs · 2<\u002Fdiv>\n        <div class=\"r-box\" style=\"border-radius:4px;\">sm · 4<\u002Fdiv>\n        <div class=\"r-box\" style=\"border-radius:6px;\">md · 6<\u002Fdiv>\n        <div class=\"r-box\" style=\"border-radius:8px;\">lg · 8<\u002Fdiv>\n        <div class=\"r-box\" style=\"border-radius:12px;\">xl · 12<\u002Fdiv>\n        <div class=\"r-box\" style=\"border-radius:999px;\">full<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; color:var(--neutral-500); margin-top:14px; line-height:1.5;\">\n        Tag 用 <code class=\"inline\">sm<\u002Fcode>；按钮 / 输入用 <code class=\"inline\">md<\u002Fcode>；卡片 / 模块用 <code class=\"inline\">lg<\u002Fcode>；弹层用 <code class=\"inline\">xl<\u002Fcode>；徽标 / 头像用 <code class=\"inline\">full<\u002Fcode>。\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">阴影<\u002Fdiv><\u002Fdiv>\n      <div class=\"shadow-demo\">\n        <div class=\"s-box\" style=\"box-shadow:none; border:var(--border-subtle);\">none · 描边替代<\u002Fdiv>\n        <div class=\"s-box\" style=\"box-shadow:var(--shadow-card);\">card · 微提升<\u002Fdiv>\n        <div class=\"s-box\" style=\"box-shadow:var(--shadow-pop);\">pop · 弹层 / 抽屉<\u002Fdiv>\n        <div class=\"s-box\" style=\"box-shadow:var(--shadow-modal);\">modal · 遮罩弹窗<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; color:var(--neutral-500); margin-top:14px; line-height:1.5;\">\n        <b style=\"color:var(--neutral-900);\">原则<\u002Fb>：扁平界面优先用描边而非阴影；阴影仅用于从页面中\"浮起\"的元素（下拉、弹层、抽屉、Modal）。\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-note\"><span>03 Typography · 04 Spacing<\u002Fspan><span>05 / 12<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 6: CORE COMPONENTS 1 ============ -->\n<section data-label=\"核心组件-输入与按钮\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">05 · Components · 输入控件<\u002Fdiv>\n    <h1 class=\"slide-title\">按钮、输入、标签<\u002Fh1>\n    <p class=\"slide-subtitle\">四档状态：default / hover / active / disabled。<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"module\">\n    <div class=\"module-header\"><div class=\"module-title\">按钮 Button<\u002Fdiv><span class=\"tag tag--neutral\">Primary · Default · Ghost · Danger<\u002Fspan><\u002Fdiv>\n    <div class=\"state-grid\">\n      <div class=\"state-cell\"><div class=\"state-label\">Default<\u002Fdiv><button class=\"btn btn--primary\">保存配置<\u002Fbutton><\u002Fdiv>\n      <div class=\"state-cell\"><div class=\"state-label\">Hover<\u002Fdiv><button class=\"btn btn--primary\" style=\"background:var(--brand-600);\">保存配置<\u002Fbutton><\u002Fdiv>\n      <div class=\"state-cell\"><div class=\"state-label\">Active<\u002Fdiv><button class=\"btn btn--primary\" style=\"background:var(--brand-700);\">保存配置<\u002Fbutton><\u002Fdiv>\n      <div class=\"state-cell\"><div class=\"state-label\">Disabled<\u002Fdiv><button class=\"btn btn--primary is-disabled\">保存配置<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"state-grid\" style=\"margin-top:12px;\">\n      <div class=\"state-cell\"><div class=\"state-label\">Default<\u002Fdiv><button class=\"btn btn--default\">取消<\u002Fbutton><\u002Fdiv>\n      <div class=\"state-cell\"><div class=\"state-label\">Hover<\u002Fdiv><button class=\"btn btn--default\" style=\"background:var(--neutral-50); border-color:var(--neutral-300);\">取消<\u002Fbutton><\u002Fdiv>\n      <div class=\"state-cell\"><div class=\"state-label\">Ghost<\u002Fdiv><button class=\"btn btn--ghost\">查看详情<\u002Fbutton><\u002Fdiv>\n      <div class=\"state-cell\"><div class=\"state-label\">Danger<\u002Fdiv><button class=\"btn btn--danger\">删除<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"col-2\" style=\"margin-top: 16px;\">\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">输入框 Input<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <div><label class=\"label\">默认态<\u002Flabel><input class=\"input\" placeholder=\"请输入科室名称\"><\u002Fdiv>\n        <div><label class=\"label\">聚焦态<\u002Flabel><input class=\"input\" value=\"内分泌科\" style=\"border-color:var(--brand-500); box-shadow:0 0 0 3px rgba(59,130,246,.12);\"><\u002Fdiv>\n        <div><label class=\"label\">错误态<\u002Flabel><input class=\"input\" value=\"abc123\" style=\"border-color:var(--danger-500); box-shadow:0 0 0 3px rgba(229,72,77,.12);\"><div class=\"help help--error\">仅支持中文与数字组合<\u002Fdiv><\u002Fdiv>\n        <div><label class=\"label\">禁用态<\u002Flabel><input class=\"input\" value=\"系统自动填充\" disabled=\"\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">标签 Tag<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;\">\n        <span class=\"tag tag--severity-high\">中影响<\u002Fspan>\n        <span class=\"tag tag--severity-mid\">低影响<\u002Fspan>\n        <span class=\"tag tag--severity-low\">可忽略<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;\">\n        <span class=\"tag tag--danger\"><span class=\"dot dot--danger\"><\u002Fspan>风险<\u002Fspan>\n        <span class=\"tag tag--success\"><span class=\"dot dot--success\"><\u002Fspan>正向<\u002Fspan>\n        <span class=\"tag tag--warning\"><span class=\"dot dot--warning\"><\u002Fspan>待关注<\u002Fspan>\n        <span class=\"tag tag--info\">信息<\u002Fspan>\n        <span class=\"tag tag--neutral\">草稿<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; color:var(--neutral-500); margin:0; line-height:1.5;\">\n        <b style=\"color:var(--neutral-900);\">用法<\u002Fb>：状态用语义色；严重度专用 <code class=\"inline\">--severity-*<\u002Fcode>（略偏橙，与 warning 区分）；同列表内的 Tag 需统一高度与字号。\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-note\"><span>05 · Components<\u002Fspan><span>06 / 12<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 7: CORE COMPONENTS 2 ============ -->\n<section data-label=\"核心组件-容器与反馈\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">05 · Components · 容器与反馈<\u002Fdiv>\n    <h1 class=\"slide-title\">Tabs · Callout · 进度条 · KPI · 表格<\u002Fh1>\n    <p class=\"slide-subtitle\">这五类组件构成了「满意度分析」模块的主要信息承载方式，全局需复用。<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"col-2\">\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">Tabs（下划线式）<\u002Fdiv><\u002Fdiv>\n      <div class=\"tabs\">\n        <div class=\"tab is-active\"><span class=\"dot dot--danger\"><\u002Fspan>风险清单<\u002Fdiv>\n        <div class=\"tab\"><span class=\"dot dot--success\"><\u002Fspan>荣誉清单<\u002Fdiv>\n        <div class=\"tab\">待处理<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; color:var(--neutral-500); line-height:1.5; margin:0;\">\n        模块内切换同类数据视图时使用下划线 Tab。<b>前置圆点<\u002Fb>可补充类别语义色。选中态用 <code class=\"inline\">--brand-500<\u002Fcode> 色 + 2px 下划线。\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">Callout 信息条<\u002Fdiv><\u002Fdiv>\n      <div class=\"callout\">\n        <svg class=\"icon\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"8\" cy=\"8\" r=\"7\"><\u002Fcircle><path d=\"M8 5v3.5M8 11.2v.05\"><\u002Fpath><\u002Fsvg>\n        <div class=\"kv-row\">\n          <span><span class=\"k\">数据覆盖度<\u002Fspan><span class=\"v link\">高<\u002Fspan><\u002Fspan>\n          <span><span class=\"k\">样本量<\u002Fspan><span class=\"v num\">2,090 份<\u002Fspan><\u002Fspan>\n          <span><span class=\"k\">可判科室<\u002Fspan><span class=\"v num\">49 / 206<\u002Fspan><\u002Fspan>\n          <span><span class=\"k\">主动评价<\u002Fspan><span class=\"v num\">57%<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:12px; color:var(--neutral-500); line-height:1.5; margin-top:12px;\">\n        用于承载<b>上下文元信息<\u002Fb>（非主数据，但解读数据的前提）。键值对以竖线分隔，值用 <code class=\"inline\">num<\u002Fcode> 等宽字体。\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"module\" style=\"margin-top:16px;\">\n    <div class=\"module-header\"><div class=\"module-title\">对比条 Bar Row<\u002Fdiv><\u002Fdiv>\n    <div class=\"bar-row\"><div class=\"bar-name\">门诊 · 退休专家<\u002Fdiv><div class=\"bar-metric\"><span class=\"score\">97<\u002Fspan><span>分<\u002Fspan><span class=\"delta-down\">▼ 2.82%<\u002Fspan><\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:92%;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"bar-row\"><div class=\"bar-name\">门诊 · 消化内科<\u002Fdiv><div class=\"bar-metric\"><span class=\"score\">92<\u002Fspan><span>分<\u002Fspan><span class=\"delta-down\">▼ 1.05%<\u002Fspan><\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:85%;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"bar-row\"><div class=\"bar-name\">住院 · 肿瘤科<\u002Fdiv><div class=\"bar-metric\"><span class=\"score\">89<\u002Fspan><span>分<\u002Fspan><span class=\"delta-up\">▲ 0.42%<\u002Fspan><\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill bar-fill--success\" style=\"width:78%;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <p style=\"font-size:12px; color:var(--neutral-500); margin-top:14px;\">\n      三列结构：<b>名称 / 指标（分 + 变化率）/ 进度轨道<\u002Fb>。轨道颜色由语义决定（风险=红，正向=绿，中性=蓝）。变化率用 <code class=\"inline\">delta-down / delta-up<\u002Fcode> 小字号。\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"col-4\" style=\"margin-top:16px;\">\n    <div class=\"kpi\">\n      <div class=\"kpi-label\">总样本量 <span style=\"opacity:.5;\">ⓘ<\u002Fspan><\u002Fdiv>\n      <div class=\"kpi-value num\">2,090<span class=\"unit\">份<\u002Fspan><\u002Fdiv>\n      <div class=\"kpi-trend up\">▲ 12.4% vs 上月<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\">\n      <div class=\"kpi-label\">整体满意度<\u002Fdiv>\n      <div class=\"kpi-value num\">96.8<span class=\"unit\">分<\u002Fspan><\u002Fdiv>\n      <div class=\"kpi-trend down\">▼ 0.82% vs 上月<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\">\n      <div class=\"kpi-label\">低分占比<\u002Fdiv>\n      <div class=\"kpi-value num\" style=\"color:var(--danger-500);\">3.0<span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n      <div class=\"kpi-trend up\" style=\"color:var(--danger-500);\">▲ 0.3% vs 上月<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\">\n      <div class=\"kpi-label\">主动评价率<\u002Fdiv>\n      <div class=\"kpi-value num\">57<span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n      <div class=\"kpi-trend up\">▲ 4.1% vs 上月<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-note\"><span>05 · Components<\u002Fspan><span>07 / 12<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 8: MODULE ANATOMY ============ -->\n<section data-label=\"模块定义规范\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">06 · Module Anatomy<\u002Fdiv>\n    <h1 class=\"slide-title\">模块定义规范 — 解剖图<\u002Fh1>\n    <p class=\"slide-subtitle\">以「满意度分析 · 高风险结构定位」为基准，抽象出标准模块的 6 个槽位。其他业务模块必须遵循同一结构。<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"anatomy-canvas\">\n    <!-- 复刻满意度分析模块样例 -->\n    <div class=\"module\">\n      <!-- ① 模块头 -->\n      <div class=\"module-header\">\n        <h3 class=\"module-title\">高风险结构定位<\u002Fh3>\n        <span class=\"tag tag--severity-high\">中影响<\u002Fspan>\n      <\u002Fdiv>\n      <!-- ② 上下文信息条 -->\n      <div class=\"callout\">\n        <svg class=\"icon\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"8\" cy=\"8\" r=\"7\"><\u002Fcircle><path d=\"M8 5v3.5M8 11.2v.05\"><\u002Fpath><\u002Fsvg>\n        <div class=\"kv-row\">\n          <span><span class=\"k\">数据覆盖度<\u002Fspan><span class=\"v link\">高 ⓘ<\u002Fspan><\u002Fspan>\n          <span><span class=\"k\">样本量<\u002Fspan><span class=\"v num\">2,090 份<\u002Fspan><\u002Fspan>\n          <span><span class=\"k\">可判科室<\u002Fspan><span class=\"v num\">49 / 206<\u002Fspan><\u002Fspan>\n          <span><span class=\"k\">主动评价<\u002Fspan><span class=\"v num\">57%<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ③ 编号小节 1 -->\n      <div class=\"section\" style=\"margin-top:20px;\">\n        <div class=\"section-heading\"><span class=\"num-chip\">①<\u002Fspan>科室服务质量排名<\u002Fdiv>\n        <div class=\"tabs\">\n          <div class=\"tab is-active\"><span class=\"dot dot--danger\"><\u002Fspan>风险清单<\u002Fdiv>\n          <div class=\"tab\"><span class=\"dot dot--success\"><\u002Fspan>荣誉清单<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:13px; color:var(--neutral-900); font-weight:500; margin: 6px 0 4px;\">门诊<\u002Fdiv>\n        <div class=\"bar-row\"><div class=\"bar-name\"><span class=\"dot dot--danger\"><\u002Fspan>退休专家<\u002Fdiv><div class=\"bar-metric\"><span class=\"score\">97<\u002Fspan><span>分<\u002Fspan><span class=\"delta-down\">▼ 2.82%<\u002Fspan><\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:92%;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ④ 编号小节 2 -->\n      <div class=\"section\">\n        <div class=\"section-heading\" style=\"justify-content:space-between;\">\n          <div style=\"display:flex; align-items:center; gap:10px;\"><span class=\"num-chip\">②<\u002Fspan>医生满意度分布<\u002Fdiv>\n          <div class=\"legend\">\n            <span><span class=\"dot\" style=\"background:var(--chart-1)\"><\u002Fspan>1–2 分<\u002Fspan>\n            <span><span class=\"dot\" style=\"background:var(--chart-2)\"><\u002Fspan>3 分<\u002Fspan>\n            <span><span class=\"dot\" style=\"background:var(--chart-3)\"><\u002Fspan>4 分<\u002Fspan>\n            <span><span class=\"dot\" style=\"background:var(--chart-5)\"><\u002Fspan>5 分<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:12px; font-size:13px;\">\n          <span style=\"color:var(--neutral-900); font-weight:500;\">🏥 门诊医生满意度分布 (5 分制)<\u002Fspan>\n          <span class=\"muted\">低分占比<\u002Fspan><span style=\"color:var(--danger-500); font-weight:600;\">3%<\u002Fspan>\n          <span class=\"muted\">(31)<\u002Fspan>\n          <span class=\"muted\">其中 1–2 分 19 · 3 分 12<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"seg-bar\" style=\"margin-top:10px;\"><span class=\"s1\" style=\"flex:2\"><\u002Fspan><span class=\"s2\" style=\"flex:1\"><\u002Fspan><span class=\"s3\" style=\"flex:1\"><\u002Fspan><span class=\"s4\" style=\"flex:1\"><\u002Fspan><span class=\"s5\" style=\"flex:12\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Anatomy pins -->\n    <div class=\"anatomy-pin\" style=\"top:28px;\"><span class=\"pin-num\">1<\u002Fspan><b>Module Header<\u002Fb><br><code>.module-header<\u002Fcode> · 标题 + 右侧严重度 Tag<\u002Fdiv>\n    <div class=\"anatomy-pin\" style=\"top:115px;\"><span class=\"pin-num\">2<\u002Fspan><b>Context Bar<\u002Fb><br><code>.callout<\u002Fcode> · 上下文元信息，竖线分隔 KV<\u002Fdiv>\n    <div class=\"anatomy-pin\" style=\"top:215px;\"><span class=\"pin-num\">3<\u002Fspan><b>Section Heading<\u002Fb><br><code>.section-heading<\u002Fcode> · ① ② 编号分组<\u002Fdiv>\n    <div class=\"anatomy-pin\" style=\"top:305px;\"><span class=\"pin-num\">4<\u002Fspan><b>View Switcher<\u002Fb><br><code>.tabs<\u002Fcode> · 同数据多视图切换<\u002Fdiv>\n    <div class=\"anatomy-pin\" style=\"top:400px;\"><span class=\"pin-num\">5<\u002Fspan><b>Data Block<\u002Fb><br><code>.bar-row / .seg-bar<\u002Fcode> · 可视化单元<\u002Fdiv>\n    <div class=\"anatomy-pin\" style=\"top:495px;\"><span class=\"pin-num\">6<\u002Fspan><b>Legend<\u002Fb><br><code>.legend<\u002Fcode> · 右上角图例，需与色序对齐<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-note\"><span>06 · Module Anatomy<\u002Fspan><span>08 / 12<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 9: MODULE RULES ============ -->\n<section data-label=\"模块规则\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">06 · Module Rules<\u002Fdiv>\n    <h1 class=\"slide-title\">模块的结构约束<\u002Fh1>\n    <p class=\"slide-subtitle\">任何业务模块，无论数据类型，都应能映射到这套槽位。<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"col-2\" style=\"gap: 20px;\">\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">模块槽位定义<\u002Fdiv><\u002Fdiv>\n      <dl class=\"spec-list\">\n        <dt>外框<\u002Fdt><dd>white + border-subtle + radius-lg + padding 20/24<\u002Fdd>\n        <dt>① Header<\u002Fdt><dd>必填：标题（fs-16/600）；选填：严重度 / 时间范围 Tag（右）<\u002Fdd>\n        <dt>② Context Bar<\u002Fdt><dd>选填；info-bg 浅底 + ⓘ 图标 + KV 列，最多 5 组<\u002Fdd>\n        <dt>③ Section<\u002Fdt><dd>≥ 1 个；编号 ① ② 置首；section-heading 下划线<\u002Fdd>\n        <dt>④ View Switcher<\u002Fdt><dd>选填；Tabs / Segment；切同数据多视图<\u002Fdd>\n        <dt>⑤ Data Block<\u002Fdt><dd>必填；Bar Row / Seg Bar / Table / Chart 之一<\u002Fdd>\n        <dt>⑥ Legend<\u002Fdt><dd>若含颜色编码必填；置小节标题右侧<\u002Fdd>\n        <dt>⑦ Footer<\u002Fdt><dd>选填；更新时间 · \"查看全部 →\" 链接<\u002Fdd>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n    <div class=\"spec-grid\" style=\"grid-template-columns:1fr; gap:12px;\">\n      <div class=\"spec-box do\">\n        <div class=\"hd\">✓ DO<\u002Fdiv>\n        <div class=\"body\">\n          <b>同类模块复用同一结构。<\u002Fb>标题左、Tag 右；Callout 只放元信息不放结论；编号 Section 从 ① 开始。图例紧贴所在 Section 的右上角。\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"spec-box dont\">\n        <div class=\"hd\">✗ DON'T<\u002Fdiv>\n        <div class=\"body\">\n          <b>不要把结论放进 Callout。<\u002Fb>不同模块使用不同的圆角、阴影、描边色。模块内用多种字号排版标题（只能 fs-16 + 600）。用纯色背景替代描边卡片。\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"spec-box\" style=\"border-color:var(--info-border); background:var(--info-bg);\">\n        <div class=\"hd\" style=\"color:var(--info-700);\">ⓘ 灵活性边界<\u002Fdiv>\n        <div class=\"body\" style=\"color:var(--neutral-700);\">\n          当业务模块只有单一数据块（如纯 KPI 区），可以省略
