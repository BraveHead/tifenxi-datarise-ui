ass=\"col-4\" style=\"gap:12px;\">\n        <div class=\"kpi\" style=\"padding:14px 16px;\"><div class=\"kpi-label\" style=\"font-size:12px;\">门诊患者满意度<\u002Fdiv><div class=\"kpi-value num\" style=\"font-size:22px;\">96.4 <span style=\"font-size:12px; color:var(--neutral-500); font-weight:400;\">分<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; color:var(--neutral-500); margin-top:4px;\"><span style=\"color:var(--success-600);\">↑同比 1.6%<\u002Fspan> · 环比 0.2%<\u002Fdiv><\u002Fdiv>\n        <div class=\"kpi\" style=\"padding:14px 16px;\"><div class=\"kpi-label\" style=\"font-size:12px;\">NSI 净满意度指数<\u002Fdiv><div class=\"kpi-value num\" style=\"font-size:22px;\">81.68 <span style=\"font-size:12px; color:var(--neutral-500); font-weight:400;\">分<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; color:var(--neutral-500); margin-top:4px;\"><span style=\"color:var(--danger-600);\">↓同比 14.6%<\u002Fspan> · 环比 0.6%<\u002Fdiv><\u002Fdiv>\n        <div class=\"kpi\" style=\"padding:14px 16px;\"><div class=\"kpi-label\" style=\"font-size:12px;\">好评率<\u002Fdiv><div class=\"kpi-value num\" style=\"font-size:22px;\">92.37 <span style=\"font-size:12px; color:var(--neutral-500); font-weight:400;\">%<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; color:var(--neutral-500); margin-top:4px;\"><span style=\"color:var(--success-600);\">↑同比 2.6%<\u002Fspan> · 环比 1.8%<\u002Fdiv><\u002Fdiv>\n        <div class=\"kpi\" style=\"padding:14px 16px; background: linear-gradient(180deg, var(--danger-bg), var(--neutral-0)); border-left: 3px solid var(--danger-500);\"><div class=\"kpi-label\" style=\"font-size:12px;\">差评率<\u002Fdiv><div class=\"kpi-value num\" style=\"font-size:22px; color:var(--danger-600);\">3.71 <span style=\"font-size:12px; color:var(--neutral-500); font-weight:400;\">%<\u002Fspan><\u002Fdiv><div style=\"font-size:11px; color:var(--neutral-500); margin-top:4px;\"><span style=\"color:var(--danger-600);\">↑同比 35%<\u002Fspan> · 环比 1.4%<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 三层结构图例 -->\n  <div class=\"col-3\" style=\"gap:16px; margin-top:14px;\">\n    <div style=\"display:flex; gap:10px; align-items:flex-start;\">\n      <span class=\"anno-dot\">L1<\u002Fspan>\n      <div style=\"font-size:12px; color:var(--neutral-700); line-height:1.6;\">\n        <b style=\"color:var(--neutral-900);\">顶部菜单栏<\u002Fb> · 高 44px，固定置顶。承载产品 Logo、一级业务模块、全局通知与用户入口。激活项使用 brand-50 底 + brand-700 文字。\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:10px; align-items:flex-start;\">\n      <span class=\"anno-dot anno-dot--warn\">L2<\u002Fspan>\n      <div style=\"font-size:12px; color:var(--neutral-700); line-height:1.6;\">\n        <b style=\"color:var(--neutral-900);\">面包屑 + 全局过滤<\u002Fb> · 高 44px。左侧承载页面层级；右侧为影响全页数据的筛选条件（时间、范围、维度）。已选条件使用 brand 描边 pill。\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:10px; align-items:flex-start;\">\n      <span class=\"anno-dot anno-dot--info\">L3<\u002Fspan>\n      <div style=\"font-size:12px; color:var(--neutral-700); line-height:1.6;\">\n        <b style=\"color:var(--neutral-900);\">页面主体<\u002Fb> · padding 18/20，底色 neutral-25。首行为页面标题 + 数据时间戳；其下依次承载 AI 简报、KPI 行、图表 / 表格模块。\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- C 状态 -->\n  <div class=\"section\" style=\"margin-top:18px;\">\n    <div class=\"section-heading\"><span class=\"num-chip\">B<\u002Fspan>状态 States — 加载 / 空 / 错误<\u002Fdiv>\n    <div class=\"col-3\">\n      <div class=\"module\">\n        <div class=\"module-header\"><div class=\"module-title\" style=\"font-size:14px;\">加载 Loading<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div class=\"skeleton\" style=\"height:14px; width:40%;\"><\u002Fdiv>\n          <div class=\"skeleton\" style=\"height:12px; width:80%;\"><\u002Fdiv>\n          <div class=\"skeleton\" style=\"height:12px; width:65%;\"><\u002Fdiv>\n          <div class=\"skeleton\" style=\"height:60px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"module\">\n        <div class=\"module-header\"><div class=\"module-title\" style=\"font-size:14px;\">空 Empty<\u002Fdiv><\u002Fdiv>\n        <div class=\"empty\">\n          <div class=\"empty-illustration\">∅<\u002Fdiv>\n          <div class=\"empty-title\">暂无满意度数据<\u002Fdiv>\n          <div class=\"empty-desc\">当前时间段内没有可供分析的样本<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"module\">\n        <div class=\"module-header\"><div class=\"module-title\" style=\"font-size:14px;\">错误 Error<\u002Fdiv><\u002Fdiv>\n        <div class=\"empty\">\n          <div class=\"empty-illustration\" style=\"color:var(--danger-500); background: repeating-linear-gradient(45deg, var(--danger-bg), var(--danger-bg) 4px, #fff 4px, #fff 8px);\">!<\u002Fdiv>\n          <div class=\"empty-title\" style=\"color:var(--danger-700);\">数据加载失败<\u002Fdiv>\n          <div class=\"empty-desc\">请检查网络或 <a style=\"color:var(--brand-600);\">重试 ↻<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-note\"><span>07 Layouts · 08 States<\u002Fspan><span>10 / 12<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 10b: KPI ROW (真实样例) ============ -->\n<section data-label=\"KPI 规范\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">05b · Components · KPI Row<\u002Fdiv>\n    <h1 class=\"slide-title\">KPI 指标卡 · 右上图标 + 同环比 + 全宽贴底趋势线<\u002Fh1>\n    <p class=\"slide-subtitle\">页面首屏的核心指标条。4–5 张为一行；每张承载：<b>名称 · 图标徽章 · 数值+单位 · 同环比双指标 · 贴底迷你趋势线<\u002Fb>；风险指标使用左红竖条 + 粉色渐变底并可挂 AI 归因入口。<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- Row 1: 4 张 -->\n  <div class=\"col-4\">\n    <!-- 1 门诊患者满意度：升 = 好 → 绿 -->\n    <div class=\"kpi-card\">\n      <div class=\"head\">\n        <span class=\"name\">门诊患者满意度<\u002Fspan>\n        <span class=\"icon-badge icon-badge--mood\">\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"8\" cy=\"8\" r=\"6.5\"><\u002Fcircle><circle cx=\"6\" cy=\"7\" r=\".6\" fill=\"currentColor\"><\u002Fcircle><circle cx=\"10\" cy=\"7\" r=\".6\" fill=\"currentColor\"><\u002Fcircle><path d=\"M5.5 10c.6.8 1.5 1.2 2.5 1.2s1.9-.4 2.5-1.2\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"value num\">96.4<span class=\"unit\">分<\u002Fspan><\u002Fdiv>\n      <div class=\"deltas\">\n        <span class=\"delta good\"><span class=\"arr\">↑<\u002Fspan><span class=\"lbl\">同比<\u002Fspan>1.6%<\u002Fspan>\n        <span class=\"delta good\"><span class=\"arr\">↑<\u002Fspan><span class=\"lbl\">环比<\u002Fspan>0.2%<\u002Fspan>\n      <\u002Fdiv>\n      <svg class=\"sparkline\" viewBox=\"0 0 240 44\" preserveAspectRatio=\"none\"><polyline stroke=\"var(--brand-500)\" points=\"0,30 20,28 40,26 60,30 80,24 100,26 120,22 140,24 160,20 180,22 200,18 220,20 240,16\"><\u002Fpolyline><\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- 2 NSI：降 = 坏 → 红 -->\n    <div class=\"kpi-card\">\n      <div class=\"head\">\n        <span class=\"name\">NSI 净满意度指数<\u002Fspan>\n        <span class=\"icon-badge icon-badge--pulse\">\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M1 8h3l1.5-3 2 6 2-5 1.5 2h4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"value num\">81.68<span class=\"unit\">分<\u002Fspan><\u002Fdiv>\n      <div class=\"deltas\">\n        <span class=\"delta bad\"><span class=\"arr\">↓<\u002Fspan><span class=\"lbl\">同比<\u002Fspan>14.6%<\u002Fspan>\n        <span class=\"delta bad\"><span class=\"arr\">↓<\u002Fspan><span class=\"lbl\">环比<\u002Fspan>0.6%<\u002Fspan>\n      <\u002Fdiv>\n      <svg class=\"sparkline\" viewBox=\"0 0 240 44\" preserveAspectRatio=\"none\"><polyline stroke=\"var(--brand-500)\" points=\"0,18 20,22 40,20 60,26 80,24 100,28 120,26 140,30 160,28 180,32 200,30 220,34 240,32\"><\u002Fpolyline><\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- 3 好评率：升 = 好 → 绿 -->\n    <div class=\"kpi-card\">\n      <div class=\"head\">\n        <span class=\"name\">好评率<\u002Fspan>\n        <span class=\"icon-badge icon-badge--trend\">\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M2 11l4-4 3 3 5-6\"><\u002Fpath><path d=\"M10 4h4v4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"value num\">92.37<span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n      <div class=\"deltas\">\n        <span class=\"delta good\"><span class=\"arr\">↑<\u002Fspan><span class=\"lbl\">同比<\u002Fspan>2.6%<\u002Fspan>\n        <span class=\"delta good\"><span class=\"arr\">↑<\u002Fspan><span class=\"lbl\">环比<\u002Fspan>1.8%<\u002Fspan>\n      <\u002Fdiv>\n      <svg class=\"sparkline\" viewBox=\"0 0 240 44\" preserveAspectRatio=\"none\"><polyline stroke=\"var(--brand-500)\" points=\"0,34 20,32 40,30 60,28 80,30 100,26 120,24 140,22 160,24 180,18 200,20 220,14 240,12\"><\u002Fpolyline><\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- 4 差评率：升 = 坏 → 红 + danger 样式 + AI 归因 -->\n    <div class=\"kpi-card danger\">\n      <div class=\"head\">\n        <span class=\"name\">差评率<\u002Fspan>\n        <span class=\"icon-badge icon-badge--alert\">\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M1 8h3l1.5-3 2 6 2-5 1.5 2h4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"value num\">3.71<span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n      <div class=\"deltas\">\n        <span class=\"delta bad\"><span class=\"arr\">↑<\u002Fspan><span class=\"lbl\">同比<\u002Fspan>35%<\u002Fspan>\n        <span class=\"delta bad\"><span class=\"arr\">↑<\u002Fspan><span class=\"lbl\">环比<\u002Fspan>1.4%<\u002Fspan>\n        <span class=\"infer-chip\">\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M8 1l1.5 3.5L13 6l-3 2.5L11 13 8 11l-3 2 1-4.5L3 6l3.5-1.5L8 1z\"><\u002Fpath><\u002Fsvg>\n          智能归因\n        <\u002Fspan>\n      <\u002Fdiv>\n      <svg class=\"sparkline\" viewBox=\"0 0 240 44\" preserveAspectRatio=\"none\"><polyline stroke=\"var(--brand-500)\" points=\"0,14 20,20 40,16 60,22 80,20 100,26 120,22 140,28 160,24 180,30 200,26 220,32 240,28\"><\u002Fpolyline><\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Row 2: 1 张（评分人次） + 规范条 -->\n  <div class=\"col-4\" style=\"margin-top:14px;\">\n    <div class=\"kpi-card\">\n      <div class=\"head\">\n        <span class=\"name\">评分人次<\u002Fspan>\n        <span class=\"icon-badge icon-badge--users\">\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"6\" cy=\"6\" r=\"2.5\"><\u002Fcircle><path d=\"M1.5 13c0-2.2 2-4 4.5-4s4.5 1.8 4.5 4\"><\u002Fpath><circle cx=\"11.5\" cy=\"5\" r=\"1.8\"><\u002Fcircle><path d=\"M10.5 13c0-1.7 1.5-3 3-3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"value num\">850<\u002Fdiv>\n      <div class=\"deltas\">\n        <span class=\"delta good\"><span class=\"arr\">↑<\u002Fspan><span class=\"lbl\">同比<\u002Fspan>127%<\u002Fspan>\n        <span class=\"delta good\"><span class=\"arr\">↑<\u002Fspan><span class=\"lbl\">环比<\u002Fspan>16.5%<\u002Fspan>\n      <\u002Fdiv>\n      <svg class=\"sparkline\" viewBox=\"0 0 240 44\" preserveAspectRatio=\"none\"><polyline stroke=\"var(--brand-500)\" points=\"0,36 30,34 60,30 90,28 120,24 150,22 180,18 210,14 240,10\"><\u002Fpolyline><\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- 规范标注：槽位解剖 -->\n    <div style=\"grid-column: span 3; display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px; align-items: start;\">\n      <div>\n        <div style=\"font-size:11px; color:var(--brand-600); font-weight:600; margin-bottom:4px; letter-spacing:.04em;\">① 名称 NAME<\u002Fdiv>\n        <div style=\"font-size:12px; color:var(--neutral-600); line-height:1.55;\">13px neutral-600；左上单行；可跟 ⓘ 提示。<b style=\"color:var(--neutral-900);\">不加粗<\u002Fb>，与数值形成对比。<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px; color:var(--brand-600); font-weight:600; margin-bottom:4px; letter-spacing:.04em;\">② 图标徽章 ICON<\u002Fdiv>\n        <div style=\"font-size:12px; color:var(--neutral-600); line-height:1.55;\">28×28 圆角 8px。<b style=\"color:var(--neutral-900);\">淡彩底 + 深色 stroke<\u002Fb>；一张卡只能一个；按指标类别配色（情感/趋势/人次/警示）。<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px; color:var(--brand-600); font-weight:600; margin-bottom:4px; letter-spacing:.04em;\">③ 数值 + 单位<\u002Fdiv>\n        <div style=\"font-size:12px; color:var(--neutral-600); line-height:1.55;\">30px semibold 等宽字；<b style=\"color:var(--neutral-900);\">单位 13px neutral-500<\u002Fb> 跟随其后半字号。<b>行对齐 baseline<\u002Fb>。<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px; color:var(--brand-600); font-weight:600; margin-bottom:4px; letter-spacing:.04em;\">④ 同环比<\u002Fdiv>\n        <div style=\"font-size:12px; color:var(--neutral-600); line-height:1.55;\">11px 透明底。<b style=\"color:var(--neutral-900);\">语义色由\"变化方向 × 指标性质\"决定<\u002Fb>：越高越好 ↑=绿；越低越好 ↑=红。<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px; color:var(--brand-600); font-weight:600; margin-bottom:4px; letter-spacing:.04em;\">⑤ 趋势线<\u002Fdiv>\n        <div style=\"font-size:12px; color:var(--neutral-600); line-height:1.55;\">全宽贴底 44px；<b style=\"color:var(--neutral-900);\">统一 brand-500<\u002Fb>；1.5px 描边；无网格无轴。体现节奏而非精度。<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- DO / DON'T + 变体 -->\n  <div class=\"col-3\" style=\"margin-top:16px; gap:14px;\">\n    <div class=\"spec-box do\">\n      <div class=\"hd\">✓ DO<\u002Fdiv>\n      <div class=\"body\">\n        一行 4–5 张、高度与槽位对齐；风险指标用 <code class=\"inline\">.kpi-card.danger<\u002Fcode>（左侧 3px 红竖条 + #fff1ea→#fff6f2 渐变底）并可挂 <code class=\"inline\">.infer-chip<\u002Fcode> AI 归因入口；sparkline 全部贴底通栏。\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-box dont\">\n      <div class=\"hd\">✗ DON'T<\u002Fdiv>\n      <div class=\"body\">\n        不要用填色 chip 表示同环比（会与 danger 卡色冲突）；不要让趋势线出现在卡片中部留白处；不要混用不同字重/字号数值；不要用多彩趋势线——<b>所有 sparkline 统一 brand 蓝<\u002Fb>。\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-box\">\n      <div class=\"hd\">语义色速查<\u002Fdiv>\n      <div class=\"body\" style=\"font-size:12px;\">\n        · 指标越高越好（满意度 / 好评率 / 评分量）：<span class=\"delta good\" style=\"font-size:11px;\"><span class=\"arr\">↑<\u002Fspan>绿<\u002Fspan> <span class=\"delta bad\" style=\"font-size:11px;\"><span class=\"arr\">↓<\u002Fspan>红<\u002Fspan><br>\n        · 指标越低越好（差评率 / 投诉 / 等待时长）：<span class=\"delta bad\" style=\"font-size:11px;\"><span class=\"arr\">↑<\u002Fspan>红<\u002Fspan> <span class=\"delta good\" style=\"font-size:11px;\"><span class=\"arr\">↓<\u002Fspan>绿<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"foot-note\"><span>05b · KPI Row<\u002Fspan><span>+1<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 10c: AI SUMMARY + INSIGHT ============ -->\n<section data-label=\"AI 总结与洞察\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">05c · Components · AI Blocks<\u002Fdiv>\n    <h1 class=\"slide-title\">AI 总结 &amp; AI 洞察 · 专用承载<\u002Fh1>\n    <p class=\"slide-subtitle\">Make 的数据驱动产品有大量 AI 生成结论。这两个块用于和普通内容做视觉区分，并允许在文案内嵌入关键词高亮。<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"col-2\" style=\"gap:20px;\">\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">AI 总结 · 顶部全局结论<\u002Fdiv><span class=\"tag tag--neutral\">每页最多 1 个<\u002Fspan><\u002Fdiv>\n      <div class=\"ai-summary\">\n        <div class=\"hd\"><span class=\"ai-icon\">✦<\u002Fspan>AI 总结<\u002Fdiv>\n        在本周期中，<span class=\"hilite\">诊疗解释满意度<\u002Fspan>与<span class=\"hilite\">医务人员回应性满意度<\u002Fspan>出现显著下降，并集中发生在【<span class=\"bad\">儿科<\u002Fspan> / <span class=\"bad\">骨科<\u002Fspan> / <span class=\"bad\">神经内科<\u002Fspan>】。\n      <\u002Fdiv>\n      <p class=\"sub-note\" style=\"margin-top:14px;\">\n        <b style=\"color:var(--neutral-900);\">用法<\u002Fb>：承载<b>跨模块的合成结论<\u002Fb>。黄底 + 金边表示\"需要阅读\"；关键词用 <code class=\"inline\">.hilite<\u002Fcode>（蓝）和 <code class=\"inline\">.bad<\u002Fcode>（红）语义高亮；不要在此处放交互按钮。\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"module\">\n      <div class=\"module-header\"><div class=\"module-title\">AI 洞察 · 节点级解读<\u002Fdiv><span class=\"tag tag--neutral\">可多个<\u002Fspan><\u002Fdiv>\n      <div class=\"ai-insight\">\n        该节点相对全院，「解释不清」和「态度冷淡」两个子维度最异常，偏离均值 <b style=\"color:var(--danger-700);\">+12pp<\u002Fb>。\n        <div class=\"ai-quote-label\" style=\"margin-top:10px;\">关键词：解释、专业术语、听不懂<\u002Fdiv>\n        <div class=\"ai-quote\">\"医生说的太专业了，我完全不懂自己什么病。\"<\u002Fdiv>\n        <div class=\"ai-quote-label\" style=\"margin-top:6px;\">关键词：态度、不耐烦、匆忙<\u002Fdiv>\n        <div class=\"ai-quote\">\"感觉医生很不耐烦，还没说完就让我出去了。\"<\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"sub-note\" style=\"margin-top:14px;\">\n        <b style=\"color:var(--neutral-900);\">用法<\u002Fb>：承载<b>局部节点的定性分析 + 原声样本<\u002Fb>。左侧金色竖线统一标识 AI；引用用 <code class=\"inline\">.ai-quote<\u002Fcode> 灰描边小卡片，不额外装饰。\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-note\"><span>05c · AI Blocks<\u002Fspan><span>+2<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 10d: ACTION LIST ============ -->\n<section data-label=\"行动建议\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">05d · Components · Action List<\u002Fdiv>\n    <h1 class=\"slide-title\">行动建议 · 编号清单<\u002Fh1>\n    <p class=\"slide-subtitle\">位于模块末尾，承载\"可执行\"的建议。每条包含：编号 · 主标题 · 执行要点 · 验证标准 · 状态 Tag。<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"action-list\">\n    <div class=\"action-card\">\n      <div class=\"num\">1<\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"title\">建立「诊疗解释标准话术」，要求医生完成 3 个关键动作：病情描述、检查说明、后续安排<span class=\"tag tag--warning\" style=\"height:20px; font-size:11px;\">建议<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">执行条件：对\"解释不清\"类差评数 &gt; 10 的科室强制上线；配合医务处培训。<\u002Fdiv>\n        <div class=\"verify\">验证：「解释不清」类差评下降 60%<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn btn--ghost btn--sm\">采纳<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"action-card\">\n      <div class=\"num\">2<\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"title\">针对高风险医生开展「患者沟通技巧」1 对 1 辅导，重点改善接诊态度和节奏把控<span class=\"tag tag--danger\" style=\"height:20px; font-size:11px;\">紧急<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">对象：节点得分 &lt; 30 且主动差评数 &gt; 10 的医生（当前 3 人）。<\u002Fdiv>\n        <div class=\"verify\">验证：该节点满意度下周期 ≥ 20<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn btn--primary btn--sm\">创建任务<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"action-card\">\n      <div class=\"num\">3<\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"title\">优化高负荷时段排班，减少单诊次接诊量从 320 降至 ≤250<span class=\"tag tag--info\" style=\"height:20px; font-size:11px;\">优化<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">覆盖：骨科、神经内科工作日 9–11 点 / 14–16 点时段。<\u002Fdiv>\n        <div class=\"verify\">验证：节点满意度提升至 &gt;75/100<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn btn--default btn--sm\">查看详情<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"col-2\" style=\"margin-top:20px;\">\n    <div class=\"spec-box do\">\n      <div class=\"hd\">✓ DO<\u002Fdiv>\n      <div class=\"body\">每条以<b>动词开头<\u002Fb>；附\"验证指标\"让建议可量化；使用右侧按钮触发下一步动作（采纳 / 创建任务 / 查看详情）。严重度 Tag 在标题末尾。<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-box dont\">\n      <div class=\"hd\">✗ DON'T<\u002Fdiv>\n      <div class=\"body\">把分析结论写进 Action（那是 AI 洞察的职责）；用图标代替编号；右侧堆多个按钮（最多 1 个主操作）。<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-note\"><span>05d · Action List<\u002Fspan><span>+3<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 10e: FULL PAGE COMPOSITION ============ -->\n<section data-label=\"完整页面 · 满意度分析\" class=\"slide\">\n  <div class=\"slide-header\">\n    <div class=\"slide-kicker\">06b · Module Composition<\u002Fdiv>\n    <h1 class=\"slide-title\">标杆样例 · 满意度分析的组装顺序<\u002Fh1>\n    <p class=\"slide-subtitle\">从顶到底的槽位顺序：<b>Header → KPI Row → Segment Tabs → AI 总结 → Section 模块 × N → Action List<\u002Fb>。其他页面必须复用此节奏。<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"background:var(--neutral-0); border: var(--border-subtle); border-radius: var(--radius-lg); padding: 20px 24px; display: flex; flex-direction: column; gap: 16px;\">\n    <!-- Page header -->\n    <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n      <div>\n        <div style=\"font-size:20px; font-weight:600; color:var(--neutral-900);\">满意度治理<\u002Fdiv>\n        <div style=\"font-size:12px; color:var(--neutral-500); margin-top:2px;\">AI · 对 19 类触点、206 科室的满意度进行统一治理<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:8px; align-items:center;\">\n        <div class=\"seg-tabs\"><span class=\"seg-tab\">周<\u002Fspan><span class=\"seg-tab is-active\">月<\u002Fspan><span class=\"seg-tab\">季<\u002Fspan><\u002Fdiv>\n        <button class=\"btn btn--default btn--sm\">导出报表<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- KPI row -->\n    <div class=\"col-4\">\n      <div class=\"kpi-card\"><div class=\"head\"><span class=\"name\">满意度<\u002Fspan><span class=\"chip up\">▲ 0.9<\u002Fspan><\u002Fdiv><div class=\"value num\">98.6<span class=\"unit\">分<\u002Fspan><\u002Fdiv><svg class=\"sparkline\" viewBox=\"0 0 120 28\" preserveAspectRatio=\"none\"><polyline fill=\"none\" stroke=\"var(--brand-500)\" stroke-width=\"1.5\" points=\"0,16 20,14 40,12 60,15 80,10 100,8 120,6\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"head\"><span class=\"name\">推荐率<\u002Fspan><span class=\"chip up\">▲ 2.1<\u002Fspan><\u002Fdiv><div class=\"value num\">91.6<span class=\"unit\">%<\u002Fspan><\u002Fdiv><svg class=\"sparkline\" viewBox=\"0 0 120 28\" preserveAspectRatio=\"none\"><polyline fill=\"none\" stroke=\"var(--success-500)\" stroke-width=\"1.5\" points=\"0,14 20,12 40,10 60,13 80,8 100,6 120,4\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n      <div class=\"kpi-card\"><div class=\"head\"><span class=\"name\">中差评率<\u002Fspan><span class=\"chip down\">▲ 0.42<\u002Fspan><\u002Fdiv><div class=\"value num\">52.8<span class=\"unit\">%<\u002Fspan><\u002Fdiv><svg class=\"sparkline\" viewBox=\"0 0 120 28\" preserveAspectRatio=\"none\"><polyline fill=\"none\" stroke=\"var(--warning-500)\" stroke-width=\"1.5\" points=\"0,8 20,12 40,10 60,14 80,12 100,16 120,18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n      <div class=\"kpi-card danger\"><div class=\"head\"><span class=\"name\">差评<\u002Fspan><span class=\"chip down\">▲ 58<\u002Fspan><\u002Fdiv><div class=\"value num\">3.71<span class=\"unit\">%<\u002Fspan><\u002Fdiv><svg class=\"sparkline\" viewBox=\"0 0 120 28\" preserveAspectRatio=\"none\"><polyline fill=\"none\" stroke=\"var(--danger-500)\" stroke-width=\"1.5\" points=\"0,20 20,18 40,14 60,12 80,8 100,6 120,4\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Segment tabs -->\n    <div style=\"display:flex; justify-content:space-between; align-items:center; border-bottom:var(--border-subtle); padding-bottom:10px;\">\n      <div class=\"seg-tabs\"><span class=\"seg-tab is-active\">结构定位<\u002Fspan><span class=\"seg-tab\">行为归因<\u002Fspan><span class=\"seg-tab\">节点详情<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:12px; color:var(--neutral-500);\">更新于 2026-04-18 14:22<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- AI 总结 -->\n    <div class=\"ai-summary\">\n      <div class=\"hd\"><span class=\"ai-icon\">✦<\u002Fspan>AI 总结<\u002Fdiv>\n      在本周期中，<span class=\"hilite\">诊疗解释满意度<\u002Fspan>与<span class=\"hilite\">医务人员回应性满意度<\u002Fspan>出现显著下降，并集中发生在【<span class=\"bad\">儿科<\u002Fspan> / <span class=\"bad\">骨科<\u002Fspan> / <span class=\"bad\">神经内科<\u002Fspan>】。\n    <\u002Fdiv>\n\n    <!-- Section 1 -->\n    <div>\n      <div class=\"section-heading\" style=\"margin-bottom:12px;\"><span class=\"num-chip\">①<\u002Fspan>高风险结构定位<span style=\"margin-left:auto;\" class=\"tag tag--severity-high\">中影响<\u002Fspan><\u002Fdiv>\n      <div class=\"col-2\">\n        <div class=\"module\" style=\"padding:14px 16px;\">\n          <div style=\"font-size:13px; color:var(--neutral-700); margin-bottom:10px;\">🏥 科室低分风险强度（决策视图）<\u002Fdiv>\n          <div class=\"dual-bar\"><span class=\"dual-name\">儿科<\u002Fspan><div class=\"dual-track\"><div class=\"dual-fill\" style=\"width:72%;\"><\u002Fdiv><div class=\"dual-ref\" style=\"left:42%;\"><\u002Fdiv><\u002Fdiv><span class=\"dual-val\">19%<\u002Fspan><\u002Fdiv>\n          <div class=\"dual-bar\"><span class=\"dual-name\">骨科<\u002Fspan><div class=\"dual-track\"><div class=\"dual-fill\" style=\"width:60%;\"><\u002Fdiv><div class=\"dual-ref\" style=\"left:42%;\"><\u002Fdiv><\u002Fdiv><span class=\"dual-val\">16%<\u002Fspan><\u002Fdiv>\n          <div class=\"dual-bar\"><span class=\"dual-name\">神内<\u002Fspan><div class=\"dual-track\"><div class=\"dual-fill\" style=\"width:52%; background:var(--warning-500);\"><\u002Fdiv><div class=\"dual-ref\" style=\"left:42%;\"><\u002Fdiv><\u002Fdiv><span class=\"dual-val\" style=\"color:var(--warning-700);\">14%<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:11px; color:var(--neutral-400); text-align:right; margin-top:6px;\">— 全院均值 12%<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"module\" style=\"padding:14px 16px;\">\n          <div style=\"font-size:13px; color:var(--neutral-700); margin-bottom:10px;\">📊 公平校准视图：接诊量 × 差评数<\u002Fdiv>\n          <svg viewBox=\"0 0 260 140\" style=\"width:100%; height:120px;\">\n            <line x1=\"30\" y1=\"10\" x2=\"30\" y2=\"130\" stroke=\"var(--neutral-200)\" stroke-dasharray=\"2,2\"><\u002Fline>\n            <line x1=\"30\" y1=\"130\" x2=\"250\" y2=\"130\" stroke=\"var(--neutral-200)\"><\u0
