name: Claude Design Auto PR

on:
  # 方式 1：手动触发（GitHub UI 或 gh CLI）
  workflow_dispatch:
    inputs:
      manifest_url:
        description: '由 Claude 提供的 patch-manifest.json 下载 URL'
        required: true
        type: string
      pr_title:
        description: 'PR 标题'
        required: false
        default: '🎨 chore(design): sync from Claude Design'
        type: string
      pr_body:
        description: 'PR 描述'
        required: false
        default: 'This PR was automatically created by Claude Design sync.'
        type: string

  # 方式 2：API 触发（Claude Design webhook / curl）
  repository_dispatch:
    types: [claude-design-sync]

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      MANIFEST_URL: ${{ github.event.inputs.manifest_url || github.event.client_payload.manifest_url }}
      PR_TITLE: ${{ github.event.inputs.pr_title || github.event.client_payload.pr_title || '🎨 chore(design): sync from Claude Design' }}
      PR_BODY: ${{ github.event.inputs.pr_body || github.event.client_payload.pr_body || 'This PR was automatically created by Claude Design sync.' }}

    steps:
      - name: Validate manifest URL
        run: |
          if [ -z "$MANIFEST_URL" ]; then
            echo "❌ manifest_url is required"
            exit 1
          fi
          echo "📦 Manifest URL: $MANIFEST_URL"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "Claude Design Bot"
          git config --global user.email "bot@claude.ai"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download manifest & files
        run: |
          set -e
          curl -sSL --fail -o manifest.json "$MANIFEST_URL"
          BASE=$(jq -r '.base_url' manifest.json)
          TOKEN=$(jq -r '.token' manifest.json)
          jq -r '.files[]' manifest.json | while read -r rel; do
            echo "→ $rel"
            mkdir -p "./_patch_tmp/$(dirname "$rel")"
            curl -sSL --fail -o "./_patch_tmp/$rel" "${BASE}${rel}${TOKEN}"
          done
          find ./_patch_tmp -maxdepth 4 -print

      - name: Apply patch to repo
        run: |
          SRC="./_patch_tmp"

          # design-system -> src/design-system
          if [ -d "$SRC/design-system" ]; then
            mkdir -p src/design-system
            cp -R "$SRC/design-system/"* src/design-system/
          fi

          # docs -> docs
          if [ -d "$SRC/docs" ]; then
            mkdir -p docs
            cp -R "$SRC/docs/"* docs/
          fi

          # CHANGELOG 追加到仓库根
          if [ -f "$SRC/CHANGELOG.md" ]; then
            if [ -f "CHANGELOG.md" ]; then
              echo "" >> CHANGELOG.md
              cat "$SRC/CHANGELOG.md" >> CHANGELOG.md
            else
              cp "$SRC/CHANGELOG.md" CHANGELOG.md
            fi
          fi

          rm -rf ./_patch_tmp manifest.json

      - name: Check changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ 无变更"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="claude-design/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH
          git commit -m "$PR_TITLE"
          git push origin $BRANCH
          gh pr create \
            --base main \
            --head $BRANCH \
            --title "$PR_TITLE" \
            --body "$PR_BODY"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
