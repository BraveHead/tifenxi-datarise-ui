name: Claude Design Auto PR

on:
  workflow_dispatch:
    inputs:
      patch_url:
        description: '由 Claude 提供的 patch.zip 下载 URL（1 小时内有效）'
        required: true
        type: string
      pr_title:
        description: 'PR 标题'
        required: false
        default: 'chore(design): sync from Claude Design'
        type: string
      pr_body:
        description: 'PR 描述'
        required: false
        default: 'This PR was automatically created by Claude Design sync.'
        type: string

  repository_dispatch:
    types: [claude-design-sync]

  schedule:
    - cron: "0 * * * *"   # 每小时自动同步（需在 Secrets 配 CLAUDE_PATCH_URL）

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Resolve patch URL
        id: resolve
        env:
          WD_URL: ${{ github.event.inputs.patch_url }}
          RD_URL: ${{ github.event.client_payload.patch_url }}
          SECRET_URL: ${{ secrets.CLAUDE_PATCH_URL }}
        run: |
          # 优先级：workflow_dispatch > repository_dispatch > secret(定时)
          URL="${WD_URL:-${RD_URL:-$SECRET_URL}}"
          if [ -z "$URL" ]; then
            echo "No patch_url available, skipping."
            exit 78
          fi
          echo "patch_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "Claude Design Bot"
          git config --global user.email "bot@claude.ai"

      - name: Download Claude Design patch
        run: |
          curl -sSL --fail -o patch.zip "${{ steps.resolve.outputs.patch_url }}"
          unzip -o patch.zip -d ./_patch_tmp
          find ./_patch_tmp -maxdepth 3 -print

      - name: Apply patch to repo
        run: |
          SRC="./_patch_tmp/patch"
          [ -d "$SRC" ] || SRC="./_patch_tmp"

          if [ -d "$SRC/design-system" ]; then
            mkdir -p src/design-system
            cp -R "$SRC/design-system/"* src/design-system/
          fi

          if [ -d "$SRC/docs" ]; then
            mkdir -p docs
            cp -R "$SRC/docs/"* docs/
          fi

          if [ -f "$SRC/CHANGELOG.md" ]; then
            if [ -f "CHANGELOG.md" ]; then
              echo "" >> CHANGELOG.md
              cat "$SRC/CHANGELOG.md" >> CHANGELOG.md
            else
              cp "$SRC/CHANGELOG.md" CHANGELOG.md
            fi
          fi

          rm -rf ./_patch_tmp patch.zip

      - name: Check changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes, skipping PR."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="claude-design/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH

          TITLE="${{ github.event.inputs.pr_title }}"
          [ -z "$TITLE" ] && TITLE="chore(design): sync from Claude Design"
          BODY="${{ github.event.inputs.pr_body }}"
          [ -z "$BODY" ] && BODY="Auto-update design from Claude Design."

          git commit -m "$TITLE"
          git push origin $BRANCH
          gh pr create \
            --base main \
            --head $BRANCH \
            --title "$TITLE" \
            --body "$BODY"
